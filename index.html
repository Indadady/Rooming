<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 카카오톡 공유 썸네일 (Meta Tags) -->
    <meta property="og:title" content="투어메이커 공식 방배정 시스템">
    <meta property="og:description" content="담당자님, 이 곳에서 방배정 명단을 작성 후 전송해주세요. (PDF 자동 변환 지원)">
    <meta property="og:image" content="https://blogger.googleusercontent.com/img/a/AVvXsEhPxG_ONo2BdFAGDNnn-pHIGJTrAq374YbqgwTTlyIZTP22kOWTDD_AyjKDNFPhsHg5t1Iq6zV0dL_NZIj4o97Kd0eWJYCv-NHhtIqme-Mp3htGhAdkqVv5NRU3Jc9TbdbvvVKrPslObA1oNABpgl12QtGwirC2QM5lcPCVoWm8pIbeKuZBbeDHAvpbKEQ">
    
    <title>투어메이커 스마트 루밍리스트</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <!-- PDF.js for PDF Text Extraction -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>

    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JLH9GD9SVR"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-JLH9GD9SVR');
    </script>

    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        
        /* 인쇄 최적화 CSS */
        @media print {
            .no-print { display: none !important; }
            body { background-color: white !important; }
            .print\:shadow-none { box-shadow: none !important; }
            .print\:p-0 { padding: 0 !important; }
            .print\:border-none { border: none !important; }
            .print\:m-0 { margin: 0 !important; }
            
            /* 강제로 A4 비율 및 내부 잘림 완벽 방지 */
            @page { 
                size: A4 portrait;
                margin: 8mm; 
            }
            
            .print-page { 
                page-break-after: always; 
                break-inside: avoid !important;
                height: 280mm !important; /* A4 용지 규격에 딱 맞춤 */
                display: flex !important;
                flex-direction: column !important;
                justify-content: space-between !important; /* 푸터를 바닥으로 밀어냄 */
            }
            
            .print-page:last-child { 
                page-break-after: auto; 
            }
            
            .room-table-container { break-inside: avoid; }
            .room-row { break-inside: avoid; }
        }
    </style>
</head>
<body class="bg-[#f1f5f9] text-slate-900 pb-20 print:bg-white print:pb-0">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 한글 -> 영문 변환기 ---
        const koreanToEnglish = (name) => {
            if (!name) return "";
            const fNames = {"김":"KIM", "이":"LEE", "박":"PARK", "최":"CHOI", "정":"JUNG", "강":"KANG", "조":"CHO", "윤":"YOON", "장":"JANG", "임":"LIM", "홍":"HONG", "송":"SONG", "오":"OH", "서":"SEO", "신":"SHIN", "권":"KWON", "황":"HWANG", "안":"AHN", "유":"YOO", "전":"JEON", "배":"BAE", "고":"KO", "문":"MOON", "양":"YANG", "손":"SON", "백":"BAEK", "허":"HEO", "남":"NAM"};
            const char1 = name.charAt(0);
            const rest = name.slice(1);
            const engFamily = fNames[char1] || "KOREAN";
            return `${engFamily} ${rest ? "NAME" : ""}`.trim(); 
        };

        const App = () => {
            const [isInternational, setIsInternational] = useState(true);
            const [showGuide, setShowGuide] = useState(true);
            const [activeTab, setActiveTab] = useState('text');
            const [headerInfo, setHeaderInfo] = useState({
                groupName: "",
                date: "",
                location: "",
                numberDesc: ""
            });

            const [rooms, setRooms] = useState([
                { id: 1, type: 'TWIN', roomNo: '', guests: [{name:"참가자1", engName:"GUEST ONE", gender:"남", remark:""}, {name:"참가자2", engName:"GUEST TWO", gender:"남", remark:""}] },
                { id: 2, type: 'TWIN', roomNo: '', guests: [{name:"참가자3", engName:"GUEST THREE", gender:"여", remark:""}, {name:"참가자4", engName:"GUEST FOUR", gender:"여", remark:""}] },
                { id: 3, type: 'SINGLE', roomNo: '', guests: [{name:"인솔자", engName:"TOUR LEADER", gender:"남", remark:"금연객실 요청"}] }
            ]);
            const [importText, setImportText] = useState("");

            // --- 요약 통계 자동 계산 (투어메이커 실무용) ---
            const stats = useMemo(() => {
                let total = 0, male = 0, female = 0;
                let roomCounts = { SINGLE: 0, TWIN: 0, TRIPLE: 0, QUAD: 0 };
                
                rooms.forEach(r => {
                    if (r.guests.some(g => g.name.trim() !== "")) {
                        roomCounts[r.type]++;
                    }
                    r.guests.forEach(g => {
                        if (g.name.trim() !== "") {
                            total++;
                            if (g.gender === '남') male++;
                            if (g.gender === '여') female++;
                        }
                    });
                });
                return { total, male, female, roomCounts };
            }, [rooms]);

            // --- 비즈니스 로직 ---
            const handleSmartImport = () => {
                if (!importText.trim()) return;
                
                const lines = importText.split('\n').filter(l => l.trim().length > 0);
                const newRooms = lines.map((line, idx) => {
                    const rawNames = line.split(/[,/]+|(?<=[가-힣a-zA-Z])\s+(?=[가-힣a-zA-Z])/).filter(n => n.trim().length >= 1);
                    
                    const guests = rawNames.map(raw => {
                        const hasFemale = raw.includes('(여)') || raw.includes('여');
                        const name = raw.replace(/\(여\)/, '').replace(/\(남\)/, '').replace(/여$/, '').replace(/남$/, '').trim();
                        return {
                            name: name,
                            engName: isInternational ? koreanToEnglish(name) : "",
                            gender: hasFemale ? "여" : "남",
                            remark: ""
                        };
                    });

                    let type = 'TWIN';
                    if (guests.length === 1) type = 'SINGLE';
                    else if (guests.length === 3) type = 'TRIPLE';
                    else if (guests.length >= 4) type = 'QUAD';

                    return { id: idx + 1, roomNo: "", type, guests };
                });

                setRooms(newRooms);
                setImportText("");
                setShowGuide(false);
            };

            const updateRoom = (rIdx, field, value) => {
                const newRooms = [...rooms];
                newRooms[rIdx][field] = value;
                setRooms(newRooms);
            };

            const updateGuest = (rIdx, gIdx, field, value) => {
                const newRooms = [...rooms];
                newRooms[rIdx].guests[gIdx][field] = value;
                
                if (field === 'name' && isInternational && !newRooms[rIdx].guests[gIdx].engName) {
                    newRooms[rIdx].guests[gIdx].engName = koreanToEnglish(value);
                }
                setRooms(newRooms);
            };

            const changeRoomType = (rIdx, type) => {
                const newRooms = [...rooms];
                newRooms[rIdx].type = type;
                const capacity = type === 'SINGLE' ? 1 : (type === 'TWIN' ? 2 : (type === 'TRIPLE' ? 3 : 4));
                
                let currentGuests = [...newRooms[rIdx].guests];
                if (currentGuests.length < capacity) {
                    while(currentGuests.length < capacity) currentGuests.push({ name: "", engName: "", gender: "남", remark: "" });
                } else {
                    currentGuests = currentGuests.slice(0, capacity);
                }
                newRooms[rIdx].guests = currentGuests;
                setRooms(newRooms);
            };

            const removeRoom = (rIdx) => setRooms(rooms.filter((_, i) => i !== rIdx));
            
            const addRoom = () => {
                setRooms([...rooms, { id: rooms.length + 1, roomNo: '', type: 'TWIN', guests: [{name:"", engName:"", gender:"남", remark:""}, {name:"", engName:"", gender:"남", remark:""}] }]);
            };

            // --- 스마트 PDF 파일 파싱 ---
            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                if (file.type !== 'application/pdf') {
                    alert("PDF 파일만 업로드 가능합니다.");
                    e.target.value = '';
                    return;
                }

                if (typeof window.pdfjsLib === 'undefined') {
                    alert("시스템 로딩 중입니다. 잠시 후 다시 시도해주세요.");
                    return;
                }

                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    let fullText = '';
                    
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        textContent.items.forEach(item => {
                            fullText += item.str + ' ';
                        });
                    }
                    
                    const words = fullText.split(/[\s,\t\n]+/);
                    let extractedNames = [];
                    const stopWords = ['성명', '이름', '투어메이커', '가이드', '객실', '번호', '베드타입', '인원수', '정보', '안내', '호텔', '프론트', '조식당', '편의점', '어메니티', '주소', '전화', '연락처', '발급', '분실'];

                    words.forEach(w => {
                        let clean = w.replace(/[0-9a-zA-Z\.\-\:\/\=\*\+\[\]\{\}\_]/g, '');
                        clean = clean.replace(/\s/g, ''); 
                        if (clean.length >= 2 && clean.length <= 6 && /^[가-힣]+(\([여남]\))?$/.test(clean)) {
                            let isStopWord = stopWords.some(stop => clean.includes(stop));
                            if (!isStopWord && clean !== '여' && clean !== '남') {
                                extractedNames.push(clean);
                            }
                        }
                    });

                    if (extractedNames.length > 0) {
                        let resultText = '';
                        for (let i = 0; i < extractedNames.length; i += 2) {
                            if (extractedNames[i+1]) {
                                resultText += `${extractedNames[i]} ${extractedNames[i+1]}\n`;
                            } else {
                                resultText += `${extractedNames[i]}\n`;
                            }
                        }
                        
                        setImportText(resultText.trim());
                        setActiveTab('text');
                        alert("✅ 작성하신 양식에서 '이름'만 성공적으로 추출했습니다!\n\n💡 표의 생김새(다단 구조 등)와 상관없이 한글 이름만 똑똑하게 찾아내어 2인 1실 기준으로 정렬해 드렸습니다.\n\n이 텍스트 창에서 줄바꿈(엔터)을 수정하여 3인실이나 1인실을 정리하신 후 [명단 일괄 자동 배정]을 눌러주세요.");
                    } else {
                        alert("⚠️ PDF에서 명단을 찾을 수 없습니다.\n(이미지 스캔본이거나 폰트를 읽을 수 없는 형식일 수 있습니다.)");
                    }
                } catch (err) {
                    console.error("PDF Parsing Error:", err);
                    alert("파일을 읽는 중 오류가 발생했습니다.");
                }
                e.target.value = ''; 
            };

            const handleShare = () => {
                alert("💡 안내: 명단 작성이 완료되셨나요?\n\n상단의 [인쇄 / PDF 저장] 버튼을 눌러 문서를 PDF로 저장하신 후,\n담당 투어메이커 직원에게 메일이나 카카오톡으로 전달해 주시면 감사하겠습니다!");
            };

            // --- 페이징 처리 로직 (절대 넘치지 않도록 안정성을 위해 1페이지당 26객실로 하향 조정) ---
            const ROOMS_PER_PAGE = 26;
            const pages = [];
            const totalPages = Math.max(1, Math.ceil(rooms.length / ROOMS_PER_PAGE));
            for (let i = 0; i < totalPages; i++) {
                pages.push(rooms.slice(i * ROOMS_PER_PAGE, (i + 1) * ROOMS_PER_PAGE));
            }

            return (
                <div>
                    {/* 상단 메뉴 */}
                    <div className="no-print bg-white border-b sticky top-0 z-50 shadow-sm">
                        <div className="max-w-[1200px] mx-auto px-4 py-3 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgHfgIX70O5k6Anuo0UgALIdaG9jSga9auHu3uyz0uEirylGPAJnjN_qQbvEGMUvPqUQf_g9FMNUHRxlDcUBf4vZ3Mpy4TnA9WxbmzWYK11gt2zuy_Irl4wctNFjcjLyPo0GPXV792o_J7L9guRMuDfeC1gy7USwywjYbECZgzcsHybuGRRAXAnO1eNmP8/s320/logo.png" alt="Tourmaker" className="h-7" />
                                <div className="h-5 w-[1px] bg-slate-200 hidden md:block"></div>
                                <div className="hidden md:flex bg-slate-100 p-1 rounded-lg">
                                    <button onClick={() => setIsInternational(false)} className={`flex items-center gap-2 px-3 py-1 rounded-md text-xs font-bold transition ${!isInternational ? 'bg-white shadow text-blue-600' : 'text-slate-500'}`}>
                                        <i className="fas fa-map-marked-alt"></i> 국내
                                    </button>
                                    <button onClick={() => setIsInternational(true)} className={`flex items-center gap-2 px-3 py-1 rounded-md text-xs font-bold transition ${isInternational ? 'bg-white shadow text-blue-600' : 'text-slate-500'}`}>
                                        <i className="fas fa-globe"></i> 해외
                                    </button>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-2">
                                <button onClick={() => setShowGuide(!showGuide)} className="px-3 py-2 text-slate-500 hover:text-blue-600 transition text-sm font-bold flex items-center gap-1">
                                    <i className="fas fa-bars"></i> 입력창 {showGuide ? '닫기' : '열기'}
                                </button>
                                
                                <button onClick={handleShare} className="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white text-sm font-bold rounded-lg hover:bg-blue-700 transition shadow-sm">
                                    <i className="fas fa-paper-plane"></i> 작성 완료 (제출)
                                </button>

                                <button onClick={() => window.print()} className="flex items-center gap-2 px-4 py-2 bg-slate-800 text-white text-sm font-bold rounded-lg hover:bg-black transition shadow-sm">
                                    <i className="fas fa-print"></i> 인쇄 / PDF 저장
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-[1100px] mx-auto p-4 md:p-6">
                        {/* 가이드 영역 */}
                        {showGuide && (
                            <div className="no-print mb-6 bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="flex border-b border-slate-200">
                                    <button onClick={() => setActiveTab('text')} className={`flex-1 py-3 text-sm font-bold flex justify-center items-center gap-2 transition ${activeTab === 'text' ? 'bg-blue-50 text-blue-700 border-b-2 border-blue-600' : 'bg-white text-slate-500 hover:bg-slate-50'}`}>
                                        <i className="fas fa-keyboard"></i> 직접 텍스트 붙여넣기
                                    </button>
                                    <button onClick={() => setActiveTab('pdf')} className={`flex-1 py-3 text-sm font-bold flex justify-center items-center gap-2 transition ${activeTab === 'pdf' ? 'bg-blue-50 text-blue-700 border-b-2 border-blue-600' : 'bg-white text-slate-500 hover:bg-slate-50'}`}>
                                        <i className="fas fa-file-pdf"></i> 작성하신 명단(PDF) 업로드
                                    </button>
                                </div>

                                <div className="p-5">
                                    {activeTab === 'text' ? (
                                        <div className="grid grid-cols-1 md:grid-cols-5 gap-6">
                                            <div className="md:col-span-2">
                                                <h4 className="font-bold mb-2 text-slate-800 text-sm flex items-center gap-2"><i className="fas fa-circle-info text-blue-500"></i> 투어메이커 제출용 명단 작성법</h4>
                                                <ul className="space-y-1.5 text-xs text-slate-600">
                                                    <li>1. 메모장에 적듯 <b>한 줄에 한 방</b> 인원을 적어주세요.</li>
                                                    <li>2. 성별 구분 없이 이름만 편하게 나열하셔도 됩니다.</li>
                                                    <li>3. 표 생성 후, 배지를 클릭해 성별을 전환할 수 있습니다.</li>
                                                </ul>
                                                <div className="mt-3 p-3 bg-slate-50 rounded border border-slate-100 text-xs text-slate-500 font-mono leading-relaxed">
                                                    참가자1 참가자2<br/>참가자3 참가자4<br/>인솔자
                                                </div>
                                            </div>
                                            <div className="md:col-span-3 flex flex-col">
                                                <textarea 
                                                    className="w-full flex-grow p-3 text-sm border border-slate-200 rounded-lg bg-slate-50 focus:bg-white focus:ring-1 focus:ring-blue-500 outline-none transition"
                                                    placeholder="이곳에 명단을 복사하여 붙여넣어 주세요..."
                                                    value={importText}
                                                    onChange={(e) => setImportText(e.target.value)}
                                                ></textarea>
                                                <button onClick={handleSmartImport} className="w-full mt-2 py-2.5 bg-slate-800 text-white text-sm font-bold rounded-lg hover:bg-black transition shadow-sm">
                                                    명단 일괄 자동 배정
                                                </button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="flex flex-col items-center justify-center py-6 text-center border-2 border-dashed border-slate-200 rounded-lg bg-slate-50">
                                            <div className="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm mb-3">
                                                <i className="fas fa-file-import text-blue-500 text-xl"></i>
                                            </div>
                                            <h4 className="font-bold text-slate-800 mb-1 text-sm">담당자님이 작성해두신 PDF 파일을 올려주세요</h4>
                                            <p className="text-xs text-slate-500 mb-4 max-w-sm">기존에 임의로 작성해두신 방배정표 파일(PDF)이 있다면 올려주세요. 시스템이 표 구조를 무시하고 사람 이름만 쏙쏙 골라 투어메이커 공식 양식으로 변환해 드립니다.</p>
                                            <input type="file" id="file-upload" accept=".pdf" className="hidden" onChange={handleFileUpload}/>
                                            <label htmlFor="file-upload" className="cursor-pointer bg-blue-600 text-white px-5 py-2 rounded font-bold text-sm hover:bg-blue-700 transition shadow-sm">
                                                PC에서 PDF 찾아보기
                                            </label>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* 여러 장으로 나뉘는 출력 양식 컨테이너 */}
                        <div className="space-y-6 print:space-y-0">
                            {pages.map((pageRooms, pageIndex) => {
                                const leftTableRooms = pageRooms.slice(0, Math.ceil(pageRooms.length / 2));
                                const rightTableRooms = pageRooms.slice(Math.ceil(pageRooms.length / 2));
                                const pageStartIndex = pageIndex * ROOMS_PER_PAGE;

                                return (
                                    <div key={pageIndex} className="print-page bg-white shadow-lg p-5 md:p-8 border-t-[6px] border-slate-800 print:shadow-none print:p-0 print:border-none print:m-0 relative flex flex-col justify-between" style={{ minHeight: '280mm' }}>
                                        
                                        <div className="flex-1 flex flex-col">
                                            {/* Header */}
                                            <div className="flex flex-col md:flex-row justify-between items-end border-b-2 border-slate-800 pb-2 mb-3 gap-4">
                                                <div className="space-y-1.5 flex-1 min-w-0 w-full mt-1">
                                                    <HeaderField label="GROUP" val={headerInfo.groupName} onChange={(v) => setHeaderInfo({...headerInfo, groupName: v})} isMain={true} placeholder="행사명을 입력하세요" />
                                                    <HeaderField label="DATE" val={headerInfo.date} onChange={(v) => setHeaderInfo({...headerInfo, date: v})} placeholder="기간 입력" />
                                                    <HeaderField label="LOCATION" val={headerInfo.location} onChange={(v) => setHeaderInfo({...headerInfo, location: v})} placeholder="지역 입력" />
                                                    
                                                    {/* 자동 요약 데이터로 교체된 인원 표시란 */}
                                                    <div className="flex items-center group w-full">
                                                        <span className="w-20 md:w-24 text-[9px] font-black text-slate-500 tracking-widest uppercase flex-shrink-0">TOTAL PAX</span>
                                                        <div className="text-xs font-bold text-slate-800 flex-1 flex items-center gap-3">
                                                            <span className="bg-slate-100 px-2 py-0.5 rounded border border-slate-200">총 인원: <span className="text-blue-600">{stats.total}</span>명</span>
                                                            <span className="text-[10px] text-slate-500">( 남 {stats.male}명 / 여 {stats.female}명 )</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="text-right flex-shrink-0 flex flex-col items-end">
                                                    <h2 className="text-2xl md:text-3xl font-black italic tracking-tighter text-slate-800 leading-none">ROOMING LIST</h2>
                                                    {totalPages > 1 && <span className="text-[10px] font-bold text-slate-400 mt-1">Page {pageIndex + 1} / {totalPages}</span>}
                                                </div>
                                            </div>

                                            <div className="flex flex-col md:flex-row justify-between items-center mb-3 gap-2">
                                                {isInternational ? (
                                                    <div className="w-full md:w-auto p-1.5 px-3 bg-blue-50 rounded border border-blue-100 no-print">
                                                        <p className="text-[11px] font-bold text-blue-800 flex items-center gap-1.5">
                                                            <i className="fas fa-circle-exclamation"></i> 
                                                            자동 변환된 영문명은 여권 스펠링과 다를 수 있으니 꼭 확인 부탁드립니다.
                                                        </p>
                                                    </div>
                                                ) : <div></div>}
                                                
                                                {/* 룸타입 요약 */}
                                                <div className="flex gap-2 text-[10px] font-bold text-slate-600 no-print">
                                                    {stats.roomCounts.SINGLE > 0 && <span className="bg-emerald-50 text-emerald-700 px-2 py-1 rounded border border-emerald-100">SGL: {stats.roomCounts.SINGLE}</span>}
                                                    {stats.roomCounts.TWIN > 0 && <span className="bg-blue-50 text-blue-700 px-2 py-1 rounded border border-blue-100">TWN: {stats.roomCounts.TWIN}</span>}
                                                    {stats.roomCounts.TRIPLE > 0 && <span className="bg-amber-50 text-amber-700 px-2 py-1 rounded border border-amber-100">TRP: {stats.roomCounts.TRIPLE}</span>}
                                                    {stats.roomCounts.QUAD > 0 && <span className="bg-purple-50 text-purple-700 px-2 py-1 rounded border border-purple-100">QUAD: {stats.roomCounts.QUAD}</span>}
                                                </div>
                                            </div>

                                            {/* Tables */}
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-4">
                                                <RoomTable rooms={leftTableRooms} startIndex={pageStartIndex} updateRoom={updateRoom} updateGuest={updateGuest} changeRoomType={changeRoomType} removeRoom={removeRoom} isInternational={isInternational} />
                                                <RoomTable rooms={rightTableRooms} startIndex={pageStartIndex + leftTableRooms.length} updateRoom={updateRoom} updateGuest={updateGuest} changeRoomType={changeRoomType} removeRoom={removeRoom} isInternational={isInternational} />
                                            </div>
                                            
                                            {/* 인원이 적을 때 메모/특이사항 공간으로 자연스럽게 쓰이는 빈 공간 (flex-grow 역할) */}
                                            <div className="flex-1"></div>
                                        </div>

                                        {/* Footer Area - 절대 바닥 고정 */}
                                        <div className="mt-6 pt-3 border-t border-slate-200 flex flex-col items-end">
                                            <div className="flex flex-col items-center w-full bg-[#f8f9fa] py-3 rounded">
                                                <div className="flex items-center gap-2 mb-1.5">
                                                    <span className="text-[9px] font-black text-[#6c757d] tracking-widest uppercase">Arranged By</span>
                                                    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgHfgIX70O5k6Anuo0UgALIdaG9jSga9auHu3uyz0uEirylGPAJnjN_qQbvEGMUvPqUQf_g9FMNUHRxlDcUBf4vZ3Mpy4TnA9WxbmzWYK11gt2zuy_Irl4wctNFjcjLyPo0GPXV792o_J7L9guRMuDfeC1gy7USwywjYbECZgzcsHybuGRRAXAnO1eNmP8/s320/logo.png" alt="Tourmaker Logo" className="h-5 object-contain" />
                                                </div>
                                                <div className="text-center w-full">
                                                    <p style={{ fontSize: '11px', color: '#6c757d', margin: 0, textAlign: 'center' }}>
                                                        [System Powered by TOURMAKER] 본 루밍리스트는 담당자의 기획과 <a href="https://tourmaker.kr" target="_blank" rel="noreferrer" style={{ fontWeight: 'bold', color: '#6c757d', textDecoration: 'underline' }}>투어메이커</a>의 트래블 테크 기술 제휴로 제작되었습니다.
                                                    </p>
                                                </div>
                                            </div>
                                        </div>

                                    </div>
                                );
                            })}
                        </div>
                        
                        {/* 명단 없이 빈 방 추가하는 명시적 버튼 */}
                        <div className="mt-8 no-print flex justify-center">
                            <button 
                                onClick={addRoom} 
                                className="bg-white border-2 border-dashed border-blue-300 text-blue-600 px-10 py-4 rounded-xl font-bold text-sm hover:bg-blue-50 hover:border-blue-500 transition-all flex items-center gap-3 shadow-sm"
                            >
                                <i className="fas fa-bed text-xl"></i> 이름 미정 빈 객실 추가하기 (클릭)
                            </button>
                        </div>
                        
                    </div>
                    
                    <button onClick={addRoom} className="no-print fixed bottom-6 right-6 w-12 h-12 bg-blue-600 text-white rounded-full shadow-lg flex items-center justify-center hover:bg-blue-700 transition-colors z-50" title="객실 추가">
                        <i className="fas fa-plus text-lg"></i>
                    </button>
                </div>
            );
        };

        const HeaderField = ({ label, val, onChange, isMain = false, placeholder }) => (
            <div className="flex items-center group w-full">
                <span className="w-20 md:w-24 text-[9px] font-black text-slate-500 tracking-widest uppercase flex-shrink-0">{label}</span>
                <input 
                    type="text" value={val} onChange={(e) => onChange(e.target.value)} placeholder={placeholder}
                    className={`${isMain ? 'text-lg md:text-xl font-black text-slate-900' : 'text-xs font-bold text-slate-700'} bg-transparent border-b border-dashed border-slate-300 hover:border-blue-400 focus:border-blue-600 outline-none flex-1 min-w-0 transition-colors pb-0.5 text-ellipsis`}
                />
            </div>
        );

        const RoomTable = ({ rooms, startIndex, updateRoom, updateGuest, changeRoomType, removeRoom, isInternational }) => (
            <div className="border-t-[2px] border-slate-800 room-table-container">
                <div className="grid grid-cols-[40px_1fr_100px] bg-slate-100 border-b border-slate-300 text-[9px] font-black py-1.5 px-1 text-center uppercase tracking-widest text-slate-600">
                    <div>No</div>
                    <div>Guest Info</div>
                    <div>Room No</div>
                </div>
                {rooms.map((room, rIdx) => {
                    const actualIdx = startIndex + rIdx;
                    return (
                        <div key={actualIdx} className="room-row grid grid-cols-[40px_1fr_100px] border-b border-slate-200 group relative min-h-[40px]">
                            {/* 룸 인덱스 & 타입 */}
                            <div className="flex flex-col items-center justify-center bg-slate-50 border-r border-slate-100 py-1">
                                <span className="text-[11px] font-black text-slate-800">{actualIdx + 1}</span>
                                <select 
                                    className="no-print mt-0.5 text-[8px] font-bold text-slate-400 bg-transparent border-none outline-none cursor-pointer hover:text-blue-600 p-0 text-center"
                                    value={room.type} onChange={(e) => changeRoomType(actualIdx, e.target.value)}>
                                    <option value="SINGLE">SGL</option>
                                    <option value="TWIN">TWN</option>
                                    <option value="TRIPLE">TRP</option>
                                    <option value="QUAD">QUAD</option>
                                </select>
                            </div>
                            
                            {/* 게스트 정보 */}
                            <div className="flex flex-col py-0.5">
                                {room.guests.map((g, gIdx) => (
                                    <div key={gIdx} className={`flex flex-col px-2 py-1 ${gIdx > 0 ? 'border-t border-slate-100' : ''}`}>
                                        <div className="flex items-center gap-2 mb-0.5 w-full">
                                            <input 
                                                className="w-20 md:w-24 font-bold text-xs outline-none bg-transparent focus:text-blue-600" 
                                                value={g.name} placeholder="이름 입력" onChange={(e) => updateGuest(actualIdx, gIdx, 'name', e.target.value)}
                                            />
                                            <button 
                                                onClick={() => updateGuest(actualIdx, gIdx, 'gender', g.gender === '남' ? '여' : '남')}
                                                className={`flex-shrink-0 text-[9px] font-bold px-1.5 py-0.5 rounded outline-none border-none cursor-pointer transition-colors ${g.gender === '여' ? 'bg-pink-50 text-pink-600 hover:bg-pink-100' : 'bg-blue-50 text-blue-600 hover:bg-blue-100'}`}
                                                title="클릭하여 성별 전환"
                                            >
                                                {g.gender}
                                            </button>
                                            <input 
                                                className="flex-1 min-w-0 text-[10px] text-slate-500 outline-none bg-transparent border-b border-dashed border-transparent hover:border-slate-300 focus:border-blue-400" 
                                                placeholder="비고 또는 특이사항" value={g.remark} onChange={(e) => updateGuest(actualIdx, gIdx, 'remark', e.target.value)}
                                            />
                                        </div>
                                        {isInternational && (
                                            <input 
                                                className="text-[10px] font-medium tracking-wide text-slate-400 outline-none uppercase bg-transparent focus:text-slate-800 w-full border-b border-transparent focus:border-slate-300 pb-0" 
                                                placeholder="ENGLISH NAME" value={g.engName} onChange={(e) => updateGuest(actualIdx, gIdx, 'engName', e.target.value)}
                                            />
                                        )}
                                    </div>
                                ))}
                            </div>
                            
                            {/* 룸 번호 */}
                            <div className="border-l border-slate-100 flex items-center justify-center p-1">
                                <input 
                                    className="w-full text-center text-[11px] font-bold text-slate-600 bg-transparent outline-none border-b border-transparent focus:border-slate-300 focus:text-blue-600 placeholder:text-[9px] placeholder:italic placeholder:font-normal placeholder:text-slate-300"
                                    placeholder="추후 배정" 
                                    value={room.roomNo} 
                                    onChange={(e) => updateRoom(actualIdx, 'roomNo', e.target.value)}
                                />
                            </div>
                            
                            <button 
                                onClick={() => removeRoom(actualIdx)}
                                className="no-print absolute -left-6 top-1/2 -translate-y-1/2 p-1 bg-white shadow-sm border border-slate-200 rounded-full text-slate-400 hover:text-red-500 hover:border-red-200 transition opacity-0 group-hover:opacity-100 z-10"
                            >
                                <i className="fas fa-trash-alt text-[10px]"></i>
                            </button>
                        </div>
                    );
                })}
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
