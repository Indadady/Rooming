    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        
        /* ========================================================
           인쇄 최적화 (웹에서 보이는 그대로 완벽 출력 - WYSIWYG)
           ======================================================== */
        @media print {
            .no-print { display: none !important; }
            body { background-color: white !important; padding: 0 !important; margin: 0 !important; }
            
            * { 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
                text-overflow: clip !important; 
                overflow: visible !important;
            }
            
            /* A4 용지 규격 및 플렉스 레이아웃 강제 */
            @page { size: A4 portrait; margin: 10mm 10mm; }

            .print-page { 
                box-shadow: none !important; padding: 0 !important; border: none !important; margin: 0 !important; 
                page-break-after: always; break-inside: avoid !important; 
                display: flex !important; flex-direction: column !important; justify-content: space-between !important;
                height: 277mm !important; /* A4 높이에서 상하 마진 제외한 절대 공간 */
                position: relative;
            }
            .print-page:last-child { page-break-after: auto; }
            
            /* 표 레이아웃 절대 고정 (틀어짐 방지) */
            table { border-collapse: collapse !important; width: 100% !important; table-layout: fixed !important; }
            thead { display: table-header-group; }
            tr { page-break-inside: avoid; }
            th, td { 
                border: none !important; border-bottom: 1px solid #cbd5e1 !important; 
                padding: 6px 2px !important; /* 인쇄용 패딩 최적화 */
                word-wrap: break-word !important; word-break: keep-all !important;
            }
            th { border-top: 2px solid #1e293b !important; border-bottom: 2px solid #1e293b !important; color: #1e293b !important; }
            th.no-border-top, td.no-border-top { border: none !important; padding: 0 !important; }
            
            /* 푸터를 종이 맨 바닥에 강력하게 고정 */
            .print-footer { 
                margin-top: auto !important; /* Flexbox 기반 맨 아래 밀어내기 */
                page-break-inside: avoid;
                width: 100%;
                padding-top: 15px !important;
                background: white !important;
            }

            /* --- 방배정 인쇄용 --- */
            .print-rooming-list { box-shadow: none !important; padding: 0 !important; border: none !important; margin: 0 !important; display: flex !important; flex-direction: column !important; }
            .room-table-container, .room-row { break-inside: avoid; }
            .room-row { padding: 0 !important; }
            
            input, select, textarea { border: none !important; background: transparent !important; appearance: none; -webkit-appearance: none; }
        }

        .dragging { opacity: 0.55; background-color: #e0f2fe; }
        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }

        .editable-cell-input { 
            white-space: normal !important; 
            width: 100% !important; 
            transition: all 0.15s ease;
            font-family: inherit;
        }
        .editable-cell-input:hover { background-color: #f1f5f9; cursor: text; border-radius: 4px; overflow: visible; }
        .editable-cell-input:focus { background-color: #e0f2fe; border-bottom: 2px solid #3b82f6; outline: none; overflow: visible; }

        .table-wrapper { overflow-x: auto; width: 100%; padding-bottom: 15px; -webkit-overflow-scrolling: touch; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        ::-webkit-scrollbar { height: 6px; width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* 고정 행 높이 (황금비율 유지를 위한 필수값) */
        .fixed-row-height { height: 36px; } 

        /* 방배정 전용 황금비율 그리드 */
        .room-grid { display: grid; grid-template-columns: 35px 8% 12% 1fr 25%; align-items: stretch; }
        @media print {
            .room-grid { grid-template-columns: 8% 12% 1fr 25%; }

        /* 입력 안내글씨(Placeholder) 자동 숨김 처리 */

        @media print {
            input::placeholder, textarea::placeholder { color: transparent !important; }

<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useMemo, useEffect } = React;

        const TM_LOGO = "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgHfgIX70O5k6Anuo0UgALIdaG9jSga9auHu3uyz0uEirylGPAJnjN_qQbvEGMUvPqUQf_g9FMNUHRxlDcUBf4vZ3Mpy4TnA9WxbmzWYK11gt2zuy_Irl4wctNFjcjLyPo0GPXV792o_J7L9guRMuDfeC1gy7USwywjYbECZgzcsHybuGRRAXAnO1eNmP8/s320/logo.png";

        // --- 영문 자동 변환 로직 ---
        const getRomanization = (char) => {
            const CHO = ["G","KK","N","D","TT","R","M","B","PP","S","SS","","J","JJ","CH","K","T","P","H"];
            const JUNG = ["A","AE","YA","YAE","EO","E","YEO","YE","O","WA","WAE","OE","YO","U","WO","WE","WI","YU","EU","UI","I"];
            const JONG = ["","K","K","K","N","N","N","T","L","L","M","P","L","L","P","L","M","P","P","T","T","NG","T","T","K","T","P","T"];
            const code = char.charCodeAt(0) - 0xAC00;
            if (code < 0 || code > 11171) return char; 
            return CHO[Math.floor(code / 588)] + JUNG[Math.floor((code % 588) / 28)] + JONG[code % 28];
        }

        const koreanToEnglish = (name) => {
            if (!name) return "";
            const fNames = {"김":"KIM", "이":"LEE", "박":"PARK", "최":"CHOI", "정":"JUNG", "강":"KANG", "조":"CHO", "윤":"YOON", "장":"JANG", "임":"LIM", "홍":"HONG", "송":"SONG", "오":"OH", "서":"SEO", "신":"SHIN", "권":"KWON", "황":"HWANG", "안":"AHN", "유":"YOO", "전":"JEON", "배":"BAE", "고":"KO", "문":"MOON", "양":"YANG", "손":"SON", "백":"BAEK", "허":"HEO", "남":"NAM", "심":"SHIM", "노":"NOH", "하":"HA", "곽":"KWAK", "성":"SUNG", "차":"CHA", "주":"JOO", "우":"WOO", "구":"KOO", "나":"NA", "민":"MIN", "엄":"EOM", "채":"CHAE", "원":"WON", "방":"BANG", "공":"KONG"};
            const char1 = name.charAt(0);
            const engFamily = fNames[char1] || getRomanization(char1);
            let engGiven = "";
            for(let i = 1; i < name.length; i++) engGiven += getRomanization(name.charAt(i));
            return `${engFamily} ${engGiven}`.trim(); 
        };

        // ==========================================
        // 1. 서브 컴포넌트 
        // ==========================================
        const AutoResizeTextarea = ({ value, onChange, placeholder, minRows = 4 }) => {
            const textareaRef = useRef(null);
            const handleChange = (e) => onChange(e.target.value);
            useEffect(() => {
                if (textareaRef.current) {
                    textareaRef.current.style.height = 'auto';
                    textareaRef.current.style.height = Math.max(textareaRef.current.scrollHeight, minRows * 24 + 32) + 'px';
                }
            }, [value, minRows]);
            return <textarea ref={textareaRef} className="w-full p-3 md:p-4 text-xs md:text-sm bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition font-mono leading-relaxed resize-none overflow-hidden" placeholder={placeholder} value={value} onChange={handleChange} rows={minRows} />;
        };

        const HeaderField = ({ label, value = "", onChange, isMain = false, fontSize, placeholder = "" }) => (
            <div className="flex items-center gap-2 print:gap-4 w-full">
                <span className={`font-black text-slate-500 tracking-widest uppercase flex-shrink-0 whitespace-nowrap`} 
                      style={{ fontSize: `${isMain ? Math.max(9, fontSize - 1) : Math.max(8, fontSize - 1.5)}pt`, width: `${Math.max(140, fontSize * 11)}px` }}>
                    {label}
                </span>
                <input 
                    type="text" 
                    className={`flex-1 border-b border-transparent hover:border-slate-300 focus:border-blue-500 outline-none px-2 transition-all text-slate-800 ${isMain ? 'font-black' : 'font-bold'}`}
                    style={{ fontSize: `${isMain ? fontSize + 4 : fontSize}pt` }}
                    value={value} 
                    placeholder={placeholder}
                    onChange={(e) => onChange(e.target.value)} 
                />
            </div>
        );

        const EditableCell = ({ val = "", onChange, bold = false, uppercase = false, placeholder = '', center = false, fontSize }) => (
            <input 
                type="text"
                title="클릭하여 내용을 수정하세요"
                className={`editable-cell-input bg-transparent outline-none border-b border-transparent focus:border-blue-400 p-0 m-0 ${bold ? 'font-black text-slate-900' : ''} ${uppercase ? 'uppercase' : ''} ${center ? 'text-center' : 'text-left'}`}
                style={{ fontSize: 'inherit' }}
                value={val}
                placeholder={placeholder}
                onChange={(e) => onChange(e.target.value)}
            />
        );

        const RoomRow = ({ room, actualIdx, globalIdx, updateRoom, updateGuest, changeRoomType, removeRoom, dragRoomStart, dragRoomEnter, dragRoomEnd, dropRoom, fontSize, isInternationalRooming }) => (
            <div
                className="room-row room-grid group relative bg-white w-full h-full"
                style={{ breakInside: 'avoid' }}
                draggable
                onDragStart={(e) => dragRoomStart(e, globalIdx)}
                onDragEnter={(e) => dragRoomEnter(e, globalIdx)}
                onDragEnd={dragRoomEnd}
                onDrop={dropRoom}
                onDragOver={(e) => e.preventDefault()}
            >
                <div className="no-print flex items-center justify-center border-r border-slate-200 text-slate-300 hover:text-blue-500 drag-handle" title="드래그하여 방 순서 변경">
                    <i className="fas fa-bars"></i>
                </div>

                <div className="flex items-center justify-center border-r border-slate-200 py-1">
                    <span className="font-bold text-slate-500 text-center" style={{ fontSize: `${fontSize}pt` }}>{actualIdx + 1}</span>
                </div>

                <div className="flex items-center justify-center border-r border-slate-200 py-1 px-1">
                    <select className="font-bold text-slate-700 bg-transparent outline-none cursor-pointer w-full text-center" style={{ fontSize: `${Math.max(8, fontSize - 1)}pt` }} value={room.type} onChange={(e) => changeRoomType(globalIdx, e.target.value)}>
                        <option value="TWIN">TWN</option><option value="TRIPLE">TRP</option><option value="SINGLE">SGL</option><option value="QUAD">QUAD</option>
                    </select>
                </div>

                <div className="flex flex-col py-0.5 bg-white min-w-0 border-r border-slate-200 justify-center">
                    {room.guests.map((g, gIdx) => (
                        <div key={gIdx} className={`flex flex-col px-1.5 md:px-2 py-1 ${gIdx > 0 ? 'border-t border-dashed border-slate-300' : ''}`} style={{ padding: `${fontSize/2.5}px 4px` }}>
                            <div className="flex items-center gap-1 md:gap-2 w-full">
                                <input className="font-bold outline-none bg-transparent focus:text-blue-600" style={{ fontSize: `${fontSize}pt`, width: `${fontSize * 4.5}px` }} value={g.name} placeholder="이름" onChange={(e) => updateGuest(globalIdx, gIdx, 'name', e.target.value)} />
                                <button type="button" onClick={() => updateGuest(globalIdx, gIdx, 'gender', g.gender === '남' ? '여' : '남')} className={`flex-shrink-0 font-bold px-1.5 py-0.5 rounded cursor-pointer ${g.gender === '여' ? 'bg-pink-50 text-pink-600' : 'bg-blue-50 text-blue-600'}`} style={{ fontSize: `${Math.max(8, fontSize - 2)}pt` }}>
                                    {g.gender}
                                </button>
                                <input className="flex-1 min-w-[30px] text-slate-500 outline-none bg-transparent col-remark" style={{ fontSize: `${Math.max(9, fontSize - 1)}pt` }} placeholder="" value={g.remark} onChange={(e) => updateGuest(globalIdx, gIdx, 'remark', e.target.value)} />
                            </div>
                            {isInternationalRooming && (
                                <input className="font-bold tracking-wide text-slate-500 outline-none uppercase bg-transparent w-full mt-0.5" style={{ fontSize: `${Math.max(8, fontSize - 1.5)}pt` }} placeholder="ENGLISH NAME" value={g.engName} onChange={(e) => updateGuest(globalIdx, gIdx, 'engName', e.target.value)} />
                            )}
                        </div>
                    ))}
                </div>

                <div className="flex items-center justify-center p-1 bg-white min-w-0 relative">
                    <input className="w-full text-center font-bold text-slate-600 bg-transparent outline-none" style={{ fontSize: `${fontSize}pt` }} placeholder="추후 배정" value={room.roomNo} onChange={(e) => updateRoom(globalIdx, 'roomNo', e.target.value)} />
                    <button type="button" onClick={() => removeRoom(globalIdx)} className="no-print absolute -right-4 top-1/2 -translate-y-1/2 p-1.5 bg-white border border-slate-200 rounded-full text-slate-400 hover:text-red-500 opacity-0 group-hover:opacity-100 z-10 shadow-sm"><i className="fas fa-trash-alt" style={{ fontSize: `${Math.max(8, fontSize - 2)}pt` }}></i></button>
                </div>
            </div>
        );

        // ==========================================
        // 2. 메인 컴포넌트 (App)
        // ==========================================
        const App = () => {
            const isInitialShared = useMemo(() => new URLSearchParams(window.location.search).get('shared') === 'true', []);
            const [isSharedMode, setIsSharedMode] = useState(isInitialShared);
            const [activeMainTab, setActiveMainTab] = useState(isInitialShared ? 'rooming' : 'traveler');
            const [isNavMenuOpen, setIsNavMenuOpen] = useState(true);

            // 폰트 스케일링
            const [docFontSize, setDocFontSize] = useState(10.5); 

            // 통합 헤더 정보
            const [commonHeader, setCommonHeader] = useState({ groupName: "", date: "", location: "", number: "" });

            // ==========================================
            // [TAB 1] 여행자 명단
            // ==========================================
            const [travelers, setTravelers] = useState([
                { id: 1, nameKor: "", nameEng: "", birth: "", gender: "M", passportNo: "", expiry: "", nation: "KOR", remark: "" }
            ]);

            const dragItem = useRef();
            const dragOverItem = useRef();

            const dragStart = (e, position) => { dragItem.current = position; e.target.closest('tr')?.classList.add('dragging'); };
            const dragEnter = (e, position) => { dragOverItem.current = position; };
            const drop = (e) => {
                const tr = e.target.closest('tr');
                if (tr) tr.classList.remove('dragging');
                if (dragItem.current === undefined || dragItem.current === null || dragOverItem.current === undefined || dragOverItem.current === null) return;
                setTravelers(prev => {
                    const copyListItems = [...prev];
                    const dragItemContent = copyListItems[dragItem.current];
                    if (!dragItemContent) return prev;
                    copyListItems.splice(dragItem.current, 1);
                    copyListItems.splice(dragOverItem.current, 0, dragItemContent);
                    return copyListItems;
                });
                dragItem.current = null; dragOverItem.current = null;
            };
            const dragEnd = (e) => { e.target.closest('tr')?.classList.remove('dragging'); dragItem.current = null; dragOverItem.current = null; };

            const getExpiryStatus = (dateStr) => {
                if (!dateStr) return { color: "text-slate-400", warning: false };
                
                // [추가] 사용자가 웹에서 6자리 숫자(예: 311022)만 쳐도 인식하게 방어
                let normalizedStr = dateStr;
                if (normalizedStr.replace(/\s/g, '').match(/^\d{6}$/)) {
                    let clean = normalizedStr.replace(/\s/g, '');
                    let y = parseInt(clean.substring(0, 2), 10);
                    y += (y > 50 ? 1900 : 2000); // 50 기준으로 1900/2000년대 자동 판별
                    normalizedStr = `${y}-${clean.substring(2, 4)}-${clean.substring(4, 6)}`;
                }

                // 정규식 개선: 2자리 년도(예: 30-10-22) 또는 4자리 년도를 모두 허용하도록 유연성 확보
                const match = normalizedStr.match(/(\d{2,4})[-./년]?\s*(\d{1,2})[-./월]?\s*(\d{1,2})/);
                if (!match) return { color: "text-slate-600", warning: false };
                
                let year = parseInt(match[1], 10);
                // 연도가 2자리로 파싱되었을 경우 2000년대로 치환 (예: 31 -> 2031)
                if (year < 100) {
                    year += 2000;
                }
                const month = parseInt(match[2], 10);
                const day = parseInt(match[3], 10);

                const expDate = new Date(year, month - 1, day);
                const today = new Date();
                today.setHours(0,0,0,0);
                
                const sixMonthsLater = new Date();
                sixMonthsLater.setMonth(today.getMonth() + 6);
                sixMonthsLater.setHours(0,0,0,0);

                if (expDate < today) return { color: "text-red-600 font-bold bg-red-50", warning: true, msg: "만료됨" };
                if (expDate < sixMonthsLater) return { color: "text-orange-500 font-bold", warning: true, msg: "6개월 미만" };
                return { color: "text-slate-700", warning: false };
            };

            const addEmptyTraveler = () => setTravelers(prev => [...prev, { id: Date.now() + Math.random(), nameKor: "", nameEng: "", birth: "", gender: "M", passportNo: "", expiry: "", nation: "KOR", remark: "" }]);
            const removeTraveler = (id) => setTravelers(prev => prev.filter(t => t.id !== id));
            
            const updateField = (id, field, val) => {
                setTravelers(prev => prev.map(t => {
                    if (t.id === id) {
                        const updated = { ...t, [field]: val };
                        if (field === 'nameKor') {
                            if (!t.nameEng || t.nameEng === koreanToEnglish(t.nameKor)) {
                                updated.nameEng = koreanToEnglish(val);
                            }
                        }
                        if (field === 'nameEng') updated.nameEng = String(val).toUpperCase();
                        if (field === 'passportNo') updated.passportNo = String(val).toUpperCase();
                        if (field === 'nation') updated.nation = String(val).toUpperCase();
                        return updated;
                    }
                    return t;
                }));
            };

            const TRAVELER_ROWS_PER_PAGE = 25; 
            const travelerPages = [];
            const totalTravelerPages = Math.max(1, Math.ceil(travelers.length / TRAVELER_ROWS_PER_PAGE));

            for (let i = 0; i < totalTravelerPages; i++) {
                const pageData = travelers.slice(i * TRAVELER_ROWS_PER_PAGE, (i + 1) * TRAVELER_ROWS_PER_PAGE);
                travelerPages.push({ pageIndex: i, data: pageData });
            }

            // ==========================================
            // [강화된 기능] 명단 엑셀 양식 다운로드 및 데이터 파싱
            // ==========================================
            const downloadExcelTemplate = () => {
                const ws_data = [
                    ['순번', '성명', '영문명(NAME)', '생년월일', '성별(M/F)', '여권번호', '여권만료일', '국적', '기타'],
                    [1, '홍길동', 'HONG GILDONG', '2009-01-01', 'M', 'M12345678', '2030-12-31', 'KOR', ''],
                    [2, '김철수', 'KIM CHULSOO', '1980-05-20', 'M', 'M87654321', '2029-06-15', 'KOR', '']
                ];
                const ws = XLSX.utils.aoa_to_sheet(ws_data);

                const headerStyle = {
                    font: { name: '맑은 고딕', sz: 11, bold: true, color: { rgb: "FFFFFF" } },
                    fill: { fgColor: { rgb: "1E3A8A" } },
                    alignment: { horizontal: "center", vertical: "center" },
                    border: {
                        top: { style: "thin", color: { rgb: "000000" } },
                        bottom: { style: "thin", color: { rgb: "000000" } },
                        left: { style: "thin", color: { rgb: "000000" } },
                        right: { style: "thin", color: { rgb: "000000" } }
                    }
                };

                const dataStyleCenter = {
                    font: { name: '맑은 고딕', sz: 10 },
                    alignment: { horizontal: "center", vertical: "center" },
                    border: {
                        top: { style: "thin", color: { rgb: "CBD5E1" } },
                        bottom: { style: "thin", color: { rgb: "CBD5E1" } },
                        left: { style: "thin", color: { rgb: "CBD5E1" } },
                        right: { style: "thin", color: { rgb: "CBD5E1" } }
                    }
                };

                const range = XLSX.utils.decode_range(ws['!ref']);
                for (let R = range.s.r; R <= range.e.r; ++R) {
                    for (let C = range.s.c; C <= range.e.c; ++C) {
                        const cellAddress = XLSX.utils.encode_cell({ r: R, c: C });
                        if (!ws[cellAddress]) continue;
                        
                        if (R === 0) {
                            ws[cellAddress].s = headerStyle;
                        } else {
                            ws[cellAddress].s = dataStyleCenter;
                        }
                    }
                }

                ws['!rows'] = [{ hpt: 25 }, { hpt: 20 }, { hpt: 20 }];
                ws['!cols'] = [
                    { wch: 6 },  { wch: 12 }, { wch: 22 }, { wch: 14 },
                    { wch: 10 }, { wch: 16 }, { wch: 14 }, { wch: 8 }, { wch: 18 } 
                ];

                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "여행자명단");
                XLSX.writeFile(wb, "투어메이커_명단표준양식.xlsx");
            };

            const importExcelData = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = new Uint8Array(event.target.result);
                        
                        // [핵심 변경사항] cellDates: true를 주어 엑셀에 셀 서식(날짜형식)으로 입력된 경우 강제로 Date 객체로 추출
                        const workbook = XLSX.read(data, { type: 'array', cellDates: true });
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        
                        // raw: true를 통해 임의 변환을 막고 원본 데이터를 그대로 배열화
                        const json = XLSX.utils.sheet_to_json(worksheet, { header: 1, raw: true });

                        // 날짜 데이터를 문자열 형태로 안전하게 변환해주는 헬퍼 함수
                        const parseExcelDate = (cellVal) => {
                            if (!cellVal) return "";
                            
                            // 1. 엑셀 날짜 객체인 경우 (하루 밀림 현상 완벽 해결: UTC 대신 브라우저 로컬 시간으로 직접 추출)
                            if (cellVal instanceof Date) {
                                const year = cellVal.getFullYear();
                                const month = String(cellVal.getMonth() + 1).padStart(2, '0');
                                const day = String(cellVal.getDate()).padStart(2, '0');
                                return `${year}-${month}-${day}`;
                            }
                            
                            let strVal = String(cellVal).trim();
                            
                            // 2. PDF에서 보였던 "11/14/09" (월/일/년도) 같은 미국식 텍스트 형태 처리
                            const usDateMatch = strVal.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
                            if (usDateMatch) {
                                let m = String(usDateMatch[1]).padStart(2, '0');
                                let d = String(usDateMatch[2]).padStart(2, '0');
                                let y = parseInt(usDateMatch[3], 10);
                                if (y < 100) y += (y > 50 ? 1900 : 2000); // 2자리 연도 보정
                                return `${y}-${m}-${d}`;
                            }

                            // 3. "091114" 같은 6자리 연속 숫자 텍스트 처리 (주민번호 앞자리 등)
                            if (strVal.match(/^\d{6}$/)) {
                                let y = parseInt(strVal.substring(0, 2), 10);
                                y += (y > 50 ? 1900 : 2000);
                                const m = strVal.substring(2, 4);
                                const d = strVal.substring(4, 6);
                                return `${y}-${m}-${d}`;
                            }

                            // 4. 일반적인 "YYYY.MM.DD" 또는 "YYYY/MM/DD" 처리
                            strVal = strVal.replace(/\./g, '-').replace(/\//g, '-');
                            return strVal;
                        };

                        const newTravelers = [];
                        for (let i = 1; i < json.length; i++) {
                            const row = json[i];
                            if (!row || row.length === 0 || !row[1] || String(row[1]).trim() === '') continue;

                            let parsedGender = 'M';
                            const rawGender = row[4] ? String(row[4]).toUpperCase().trim() : '';
                            if (rawGender === 'F' || rawGender === '여') parsedGender = 'F';

                            newTravelers.push({
                                id: Date.now() + Math.random() + i,
                                nameKor: String(row[1]).trim(),
                                nameEng: row[2] ? String(row[2]).toUpperCase().trim() : koreanToEnglish(String(row[1]).trim()),
                                birth: parseExcelDate(row[3]),
                                gender: parsedGender,
                                passportNo: row[5] ? String(row[5]).toUpperCase().trim() : "",
                                expiry: parseExcelDate(row[6]),
                                nation: row[7] ? String(row[7]).toUpperCase().trim() : "KOR",
                                remark: row[8] ? String(row[8]).trim() : ""
                            });
                        }

                        if (newTravelers.length > 0) {
                            setTravelers(newTravelers);
                            alert(`✅ 성공적으로 ${newTravelers.length}명의 명단 데이터를 웹으로 불러왔습니다.\n\n오타가 없는지 웹 화면에서 최종 확인해 주세요.`);
                        } else {
                            alert("⚠️ 엑셀 파일에 유효한 데이터(성명)가 없습니다. 양식을 다시 확인해주세요.");
                        }
                    } catch (error) {
                        console.error("엑셀 파싱 에러:", error);
                        alert("⚠️ 엑셀 파일을 읽는 중 오류가 발생했습니다. 올바른 포맷인지 확인해주세요.");
                    }
                };
                reader.readAsArrayBuffer(file);
                e.target.value = '';
            };


            // ==========================================
            // [TAB 2] 방 배정 (루밍리스트)
            // ==========================================
            const [isInternationalRooming, setIsInternationalRooming] = useState(true);
            const [activeSubTabRooming, setActiveSubTabRooming] = useState('text');
            const [rooms, setRooms] = useState([
                { id: 1, type: 'TWIN', roomNo: '', guests: [{name:"", engName:"", gender:"남", remark:""}, {name:"", engName:"", gender:"남", remark:""}] }
            ]);
            const [importTextRooming, setImportTextRooming] = useState("");

            const dragRoomItem = useRef();
            const dragOverRoomItem = useRef();

            const dragRoomStart = (e, position) => { dragRoomItem.current = position; e.target.closest('.room-row')?.classList.add('dragging'); };
            const dragRoomEnter = (e, position) => { dragOverRoomItem.current = position; };
            const dropRoom = (e) => {
                const tr = e.target.closest('.room-row');
                if (tr) tr.classList.remove('dragging');
                if (dragRoomItem.current === undefined || dragRoomItem.current === null || dragOverRoomItem.current === undefined || dragOverRoomItem.current === null) return;
                setRooms(prev => {
                    const copyRooms = [...prev];
                    const dragContent = copyRooms[dragRoomItem.current];
                    if (!dragContent) return prev;
                    copyRooms.splice(dragRoomItem.current, 1);
                    copyRooms.splice(dragOverRoomItem.current, 0, dragContent);
                    return copyRooms;
                });
                dragRoomItem.current = null; dragOverRoomItem.current = null;
            };
            const dragRoomEnd = (e) => { e.target.closest('.room-row')?.classList.remove('dragging'); dragRoomItem.current = null; dragOverRoomItem.current = null;};

            const roomStats = useMemo(() => {
                let total = 0, male = 0, female = 0;
                let roomCounts = { SINGLE: 0, TWIN: 0, TRIPLE: 0, QUAD: 0 };
                rooms.forEach(r => {
                    if (r.guests.some(g => g.name.trim() !== "")) roomCounts[r.type]++;
                    r.guests.forEach(g => {
                        if (g.name.trim() !== "") {
                            total++;
                            if (g.gender === '남') male++;
                            else female++;
                        }
                    });
                });
                return { total, male, female, roomCounts };
            }, [rooms]);

            const handleRoomingSmartImport = () => {
                if (!importTextRooming.trim()) return;
                const lines = importTextRooming.split('\n').filter(l => l.trim().length > 0);
                const newRooms = lines.map((line, idx) => {
                    const rawNames = line.split(/[\s,/\t]+/).map(name => name.trim()).filter(Boolean);
                    const guests = rawNames.map(raw => {
                        const hasFemale = raw.includes('(여)') || /여$/.test(raw);
                        const cleanName = raw.replace(/\(여\)|\(남\)|여$|남$/g, '').trim();
                        return { name: cleanName, engName: isInternationalRooming ? koreanToEnglish(cleanName) : "", gender: hasFemale ? "여" : "남", remark: "" };
                    });
                    let type = 'TWIN';
                    if (guests.length <= 1) type = 'SINGLE';
                    else if (guests.length === 2) type = 'TWIN';
                    else if (guests.length === 3) type = 'TRIPLE';
                    else type = 'QUAD';
                    return { id: Date.now() + Math.random(), roomNo: "", type, guests: guests.slice(0, type === 'SINGLE' ? 1 : type === 'TWIN' ? 2 : type === 'TRIPLE' ? 3 : 4) };
                });
                
                setRooms(prev => {
                    if (prev.length === 1 && prev[0].guests.every(g => g.name === "")) return newRooms;
                    return [...prev, ...newRooms];
                });
                setImportTextRooming("");
            };

            const updateRoom = (rIdx, field, value) => { 
                setRooms(prev => prev.map((room, idx) => idx === rIdx ? { ...room, [field]: value } : room)); 
            };
            
            const updateGuest = (globalIdx, gIdx, field, value) => {
                setRooms(prev => prev.map((room, rIndex) => {
                    if (rIndex === globalIdx) {
                        const newGuests = room.guests.map((guest, guestIndex) => {
                            if (guestIndex === gIdx) {
                                const updatedGuest = { ...guest, [field]: value };
                                if (field === 'name' && isInternationalRooming) {
                                    if (!guest.engName || guest.engName === koreanToEnglish(guest.name)) {
                                        updatedGuest.engName = koreanToEnglish(value);
                                    }
                                }
                                if (field === 'engName') updatedGuest.engName = String(value).toUpperCase();
                                return updatedGuest;
                            }
                            return guest;
                        });
                        return { ...room, guests: newGuests };
                    }
                    return room;
                }));
            };

            const changeRoomType = (globalIdx, type) => {
                setRooms(prev => prev.map((room, rIndex) => {
                    if (rIndex === globalIdx) {
                        const capacity = type === 'SINGLE' ? 1 : (type === 'TWIN' ? 2 : (type === 'TRIPLE' ? 3 : 4));
                        let currentGuests = [...room.guests];
                        if (currentGuests.length < capacity) {
                            while(currentGuests.length < capacity) currentGuests.push({ name: "", engName: "", gender: "남", remark: "" });
                        } else {
                            currentGuests = currentGuests.slice(0, capacity);
                        }
                        return { ...room, type, guests: currentGuests };
                    }
                    return room;
                }));
            };

            const removeRoom = (globalIdx) => setRooms(prev => prev.filter((_, idx) => idx !== globalIdx));
            const addRoom = () => setRooms(prev => [...prev, { id: Date.now() + Math.random(), roomNo: '', type: 'TWIN', guests: [{name:"", engName:"", gender:"남", remark:""}, {name:"", engName:"", gender:"남", remark:""}] }]);

            const ROOMS_PER_PAGE = 22;
            const roomPages = [];
            const totalRoomPages = Math.max(1, Math.ceil(rooms.length / ROOMS_PER_PAGE));
            for (let i = 0; i < totalRoomPages; i++) roomPages.push(rooms.slice(i * ROOMS_PER_PAGE, (i + 1) * ROOMS_PER_PAGE));

            // ==========================================
            // [데이터 저장/불러오기 및 공유 링크 생성]
            // ==========================================
            const exportData = () => {
                const dataToSave = { travelers, commonHeader, rooms };
                const blob = new Blob([JSON.stringify(dataToSave, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `투어메이커_데이터_${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };

            const importData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.travelers) setTravelers(data.travelers);
                        if (data.commonHeader) setCommonHeader(data.commonHeader);
                        if (data.rooms) setRooms(data.rooms);
                        alert("✅ 저장된 데이터를 성공적으로 불러왔습니다.");
                    } catch (error) {
                        alert("⚠️ 데이터를 읽는 중 오류가 발생했습니다. 올바른 파일인지 확인해주세요.");
                    }
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            const handleCopyLink = () => {
                const baseUrl = window.location.origin + window.location.pathname;
                const shareUrl = `${baseUrl}?shared=true`;
                
                fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(shareUrl)}`)
                    .then(res => res.json())
                    .then(data => {
                        const finalUrl = data.shorturl || shareUrl;
                        executeCopy(finalUrl);
                    })
                    .catch(() => {
                        executeCopy(shareUrl);
                    });
            };

            const executeCopy = (urlToCopy) => {
                const textArea = document.createElement("textarea");
                textArea.value = urlToCopy;
                textArea.style.position = "fixed";
                textArea.style.top = "-9999px";
                textArea.style.left = "-9999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                
                try {
                    const successful = document.execCommand('copy');
                    if(successful) {
                        alert(`✅ 담당자 공유용 단축 링크(${urlToCopy})가 복사되었습니다!\n이 링크로 접속하면 불필요한 기능이 숨겨진 '심플 작성 모드'로 열립니다.`);
                    } else {
                        prompt("브라우저 정책으로 자동 복사에 실패했습니다. 아래 주소를 직접 복사(Ctrl+C)해 주세요:", urlToCopy);
                    }
                } catch (err) {
                    prompt("브라우저 정책으로 자동 복사에 실패했습니다. 아래 주소를 직접 복사(Ctrl+C)해 주세요:", urlToCopy);
                } finally {
                    document.body.removeChild(textArea);
                }
            };

            const handlePrint = () => {
                if(isSharedMode) {
                    alert("PDF 파일로 인쇄 및 저장하신 후 투어메이커 담당자에게 전달해 주시면 즉시 공유하겠습니다.");
                }
                setTimeout(() => { window.print(); }, 100);
            };

            // ==========================================
            // 렌더링 시작
            // ==========================================
            return (
                <div className="min-h-screen flex flex-col bg-slate-50">
                    {/* 상단 네비게이션 */}
                    <div className="no-print bg-[#1e293b] border-b shadow-md sticky top-0 z-50">
                        <div className="max-w-[1400px] mx-auto px-3 md:px-4 flex flex-col md:flex-row justify-between items-center py-2 md:py-0 gap-2 md:gap-3">
                            
                            <div className="flex w-full md:w-auto justify-center md:justify-start items-center pb-1 md:pb-0">
                                <div className="flex items-center gap-2 md:gap-3">
                                    <img src={TM_LOGO} className="h-5 md:h-6 filter brightness-0 invert" alt="Tourmaker Logo" />
                                    <div className="h-3 md:h-4 w-[1px] bg-slate-500"></div>
                                    <h1 className="font-bold text-white tracking-wide text-xs md:text-sm">통합 관리 센터</h1>
                                </div>
                            </div>
                            
                            <div className="flex w-full md:w-auto justify-center overflow-x-auto hide-scrollbar">
                                <button onClick={() => setActiveMainTab('traveler')} className={`whitespace-nowrap px-3 md:px-5 py-2 md:py-4 h-full flex items-center font-bold text-[13px] md:text-sm border-b-[3px] transition-all md:rounded-t-md ${activeMainTab === 'traveler' ? 'border-blue-400 text-white bg-slate-800' : 'border-transparent text-slate-400 hover:text-slate-200 hover:bg-slate-800'}`}>
                                    <i className="fas fa-passport mr-2"></i> 1. 여행자 명단
                                </button>
                                <button onClick={() => setActiveMainTab('rooming')} className={`whitespace-nowrap px-3 md:px-5 py-2 md:py-4 h-full flex items-center font-bold text-[13px] md:text-sm border-b-[3px] transition-all md:rounded-t-md ${activeMainTab === 'rooming' ? 'border-blue-400 text-white bg-slate-800' : 'border-transparent text-slate-400 hover:text-slate-200 hover:bg-slate-800'}`}>
                                    <i className="fas fa-bed mr-2"></i> 2. 방 배정 (루밍)
                                </button>
                            </div>

                            <div className="flex w-full md:w-auto justify-end gap-2 pt-1 md:pt-0 border-t border-slate-700 md:border-none">
                                {!isSharedMode && (
                                    <React.Fragment>
                                        <button onClick={handleCopyLink} className="text-slate-300 hover:text-white px-2 py-1.5 text-xs font-bold transition flex items-center gap-1" title="공유용 단축 링크 생성 및 복사">
                                            <i className="fas fa-link"></i> 링크 복사
                                        </button>
                                        <input type="file" id="json-upload" accept=".json" className="hidden" onChange={importData} />
                                        <label htmlFor="json-upload" className="cursor-pointer text-slate-300 hover:text-white px-2 py-1.5 text-xs font-bold transition flex items-center gap-1" title="저장했던 데이터 불러오기">
                                            <i className="fas fa-folder-open"></i> 불러오기
                                        </label>
                                        <button onClick={exportData} className="text-slate-300 hover:text-white px-2 py-1.5 text-xs font-bold transition flex items-center gap-1" title="현재 상태를 파일로 컴퓨터에 저장">
                                            <i className="fas fa-save"></i> 데이터 저장
                                        </button>
                                    </React.Fragment>
                                )}
                                <button onClick={handlePrint} className="bg-blue-600 text-white px-3 md:px-4 py-1.5 md:py-2 rounded font-bold text-xs md:text-sm hover:bg-blue-500 transition shadow flex items-center gap-2">
                                    <i className="fas fa-file-pdf"></i> PDF 인쇄
                                </button>
                            </div>
                        </div>
                    </div>

                    <main className="flex-grow p-0 sm:p-4 md:p-8">
                        {/* ========================================================================= */}
                        {/* TAB 1: 여행자 명단 */}
                        {/* ========================================================================= */}
                        <div className={activeMainTab === 'traveler' ? 'block' : 'hidden'}>
                            
                            {/* 안내 문구 (웹 전용) 및 상단 컨트롤 */}
                            <div className="no-print max-w-[1400px] mx-auto mb-3 flex flex-col gap-2 px-3 md:px-4 bg-blue-50 py-3 rounded border border-blue-100">
                                <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2">
                                    <p className="text-[11px] md:text-sm text-blue-800 font-bold leading-relaxed">
                                        <i className="fas fa-lightbulb text-amber-500 mr-2"></i>
                                        셀을 마우스로 클릭해 직접 타이핑하세요. (좌측 ≡ 드래그로 행 순서 변경 가능)
                                    </p>
                                    
                                    <div className="flex items-center gap-2 self-end sm:self-auto flex-wrap justify-end">
                                        
                                        {/* [강화된 기능] 엑셀 양식 다운 및 업로드 */}
                                        {!isSharedMode && (
                                            <div className="flex items-center gap-2 bg-white px-2 py-1.5 rounded shadow-sm border border-emerald-300">
                                                <button onClick={downloadExcelTemplate} className="text-xs font-bold text-emerald-700 hover:text-emerald-900 flex items-center gap-1.5 transition whitespace-nowrap" title="표준 엑셀 양식 다운로드">
                                                    <i className="fas fa-download"></i> 양식 다운
                                                </button>
                                                <div className="w-[1px] h-3 bg-emerald-300"></div>
                                                <label htmlFor="excel-upload" className="cursor-pointer text-xs font-bold text-emerald-700 hover:text-emerald-900 flex items-center gap-1.5 transition m-0 whitespace-nowrap" title="작성된 엑셀 파일 불러오기">
                                                    <i className="fas fa-file-excel"></i> 명단 업로드
                                                </label>
                                                <input type="file" id="excel-upload" accept=".xlsx, .xls" className="hidden" onChange={importExcelData} />
                                            </div>
                                        )}

                                        <div className="flex items-center gap-2 bg-white px-2 py-1.5 rounded shadow-sm border border-slate-200">
                                            <span className="text-xs font-bold text-slate-500 whitespace-nowrap"><i className="fas fa-search-plus"></i> 글자 크기:</span>
                                            <button onClick={() => setDocFontSize(Math.max(8, docFontSize - 0.5))} className="w-5 h-5 flex justify-center items-center bg-slate-100 hover:bg-slate-200 rounded text-slate-600 font-bold">-</button>
                                            <span className="text-xs font-bold text-blue-600 w-10 text-center">{docFontSize}pt</span>
                                            <button onClick={() => setDocFontSize(Math.min(16, docFontSize + 0.5))} className="w-5 h-5 flex justify-center items-center bg-slate-100 hover:bg-slate-200 rounded text-slate-600 font-bold">+</button>
                                        </div>
                                        
                                        {!isSharedMode && (
                                            <button onClick={() => setTravelers([{ id: Date.now(), nameKor: "", nameEng: "", birth: "", gender: "M", passportNo: "", expiry: "", nation: "KOR", remark: "" }])} className="text-[10px] md:text-xs text-red-500 hover:text-red-700 font-bold underline whitespace-nowrap ml-1"><i className="fas fa-trash-alt"></i> 전체 초기화</button>
                                        )}
                                        <span className="text-[11px] md:text-sm font-black text-slate-700 whitespace-nowrap ml-2">실 인원 <span className="text-blue-600 text-base md:text-lg">{travelers.length}</span> 명</span>
                                    </div>
                                </div>
                                <p className="text-[10px] md:text-[12px] font-bold text-red-600 leading-relaxed"><i className="fas fa-exclamation-circle mr-1"></i> 한글 이름을 입력하면 영문명이 자동으로 변환됩니다. 실제 여권과 대조하여 반드시 재확인 바랍니다.</p>
                            </div>

                            {/* 페이지 분할 렌더링 영역 */}
