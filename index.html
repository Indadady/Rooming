    <style>

           인쇄 최적화 (웹에서 보이는 그대로 완벽 출력 - WYSIWYG)
           ======================================================== */

            * {

                box-shadow: none !important; padding: 0 !important; border: none !important; margin: 0 !important;

                border: none !important; border-bottom: 1px solid #cbd5e1 !important; 
                padding: 6px 2px !important; /* 인쇄용 패딩 최적화 */
                word-wrap: break-word !important; word-break: keep-all !important;

<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useMemo, useEffect } = React;

        const TM_LOGO = "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgHfgIX70O5k6Anuo0UgALIdaG9jSga9auHu3uyz0uEirylGPAJnjN_qQbvEGMUvPqUQf_g9FMNUHRxlDcUBf4vZ3Mpy4TnA9WxbmzWYK11gt2zuy_Irl4wctNFjcjLyPo0GPXV792o_J7L9guRMuDfeC1gy7USwywjYbECZgzcsHybuGRRAXAnO1eNmP8/s320/logo.png";

        // --- 영문 자동 변환 로직 ---
        const getRomanization = (char) => {
            const CHO = ["G","KK","N","D","TT","R","M","B","PP","S","SS","","J","JJ","CH","K","T","P","H"];
            const JUNG = ["A","AE","YA","YAE","EO","E","YEO","YE","O","WA","WAE","OE","YO","U","WO","WE","WI","YU","EU","UI","I"];
            const JONG = ["","K","K","K","N","N","N","T","L","L","M","P","L","L","P","L","M","P","P","T","T","NG","T","T","K","T","P","T"];
            const code = char.charCodeAt(0) - 0xAC00;
            if (code < 0 || code > 11171) return char; 
            return CHO[Math.floor(code / 588)] + JUNG[Math.floor((code % 588) / 28)] + JONG[code % 28];
        }

        const koreanToEnglish = (name) => {
            if (!name) return "";
            const fNames = {"김":"KIM", "이":"LEE", "박":"PARK", "최":"CHOI", "정":"JUNG", "강":"KANG", "조":"CHO", "윤":"YOON", "장":"JANG", "임":"LIM", "홍":"HONG", "송":"SONG", "오":"OH", "서":"SEO", "신":"SHIN", "권":"KWON", "황":"HWANG", "안":"AHN", "유":"YOO", "전":"JEON", "배":"BAE", "고":"KO", "문":"MOON", "양":"YANG", "손":"SON", "백":"BAEK", "허":"HEO", "남":"NAM", "심":"SHIM", "노":"NOH", "하":"HA", "곽":"KWAK", "성":"SUNG", "차":"CHA", "주":"JOO", "우":"WOO", "구":"KOO", "나":"NA", "민":"MIN", "엄":"EOM", "채":"CHAE", "원":"WON", "방":"BANG", "공":"KONG"};
            const char1 = name.charAt(0);
            const engFamily = fNames[char1] || getRomanization(char1);
            let engGiven = "";
            for(let i = 1; i < name.length; i++) engGiven += getRomanization(name.charAt(i));
            return `${engFamily} ${engGiven}`.trim(); 
        };

        const AutoResizeTextarea = ({ value, onChange, placeholder, minRows = 4 }) => {
            const textareaRef = useRef(null);
            const handleChange = (e) => onChange(e.target.value);
            useEffect(() => {
                if (textareaRef.current) {
                    textareaRef.current.style.height = 'auto';
                    textareaRef.current.style.height = Math.max(textareaRef.current.scrollHeight, minRows * 24 + 32) + 'px';
                }
            }, [value, minRows]);
            return <textarea ref={textareaRef} className="w-full p-3 md:p-4 text-xs md:text-sm bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition font-mono leading-relaxed resize-none overflow-hidden" placeholder={placeholder} value={value} onChange={handleChange} rows={minRows} />;
        };

        const App = () => {
            const isInitialShared = useMemo(() => new URLSearchParams(window.location.search).get('shared') === 'true', []);
            const [isSharedMode, setIsSharedMode] = useState(isInitialShared);
            const [activeMainTab, setActiveMainTab] = useState(isInitialShared ? 'rooming' : 'traveler');
            const [isNavMenuOpen, setIsNavMenuOpen] = useState(true);

            // 폰트 스케일링 (A4 최적화 기준 10.5pt 설정)
            const [docFontSize, setDocFontSize] = useState(10.5); 

            // 통합 헤더 정보 (범용 템플릿용 빈칸 초기화)
            const [commonHeader, setCommonHeader] = useState({ groupName: "", date: "", location: "", number: "" });

            // ==========================================
            // [TAB 1] 여행자 명단 (황금비율 및 A4 꽉 채우기)
            // ==========================================
            const [travelers, setTravelers] = useState([
                { id: 1, nameKor: "", nameEng: "", birth: "", gender: "M", passportNo: "", expiry: "", nation: "KOR", remark: "" }
            ]);

            const dragItem = useRef();
            const dragOverItem = useRef();

            const dragStart = (e, position) => { dragItem.current = position; e.target.closest('tr')?.classList.add('dragging'); };
            const dragEnter = (e, position) => { dragOverItem.current = position; };
            const drop = (e) => {
                const tr = e.target.closest('tr');
                if (tr) tr.classList.remove('dragging');
                if (dragItem.current === undefined || dragItem.current === null || dragOverItem.current === undefined || dragOverItem.current === null) return;
                setTravelers(prev => {
                    const copyListItems = [...prev];
                    const dragItemContent = copyListItems[dragItem.current];
                    if (!dragItemContent) return prev;
                    copyListItems.splice(dragItem.current, 1);
                    copyListItems.splice(dragOverItem.current, 0, dragItemContent);
                    return copyListItems;
                });
                dragItem.current = null; dragOverItem.current = null;
            };
            const dragEnd = (e) => { e.target.closest('tr')?.classList.remove('dragging'); dragItem.current = null; dragOverItem.current = null; };

            const getExpiryStatus = (dateStr) => {
                if (!dateStr) return { color: "text-slate-400", warning: false };
                const match = dateStr.match(/(\d{4})[-./년]?\s*(\d{1,2})[-./월]?\s*(\d{1,2})/);
                if (!match) return { color: "text-slate-600", warning: false };
                const expDate = new Date(match[1], match[2] - 1, match[3]);
                const today = new Date();
                const sixMonthsLater = new Date();
                sixMonthsLater.setMonth(today.getMonth() + 6);
                if (expDate < today) return { color: "text-red-600 font-bold bg-red-50", warning: true, msg: "만료됨" };
                if (expDate < sixMonthsLater) return { color: "text-orange-500 font-bold", warning: true, msg: "6개월 미만" };
                return { color: "text-slate-700", warning: false };
            };

            const addEmptyTraveler = () => setTravelers(prev => [...prev, { id: Date.now() + Math.random(), nameKor: "", nameEng: "", birth: "", gender: "M", passportNo: "", expiry: "", nation: "KOR", remark: "" }]);
            const removeTraveler = (id) => setTravelers(prev => prev.filter(t => t.id !== id));
            
            const updateField = (id, field, val) => {
                setTravelers(prev => prev.map(t => {
                    if (t.id === id) {
                        const updated = { ...t, [field]: val };
                        if (field === 'nameKor') {
                            if (!t.nameEng || t.nameEng === koreanToEnglish(t.nameKor)) {
                                updated.nameEng = koreanToEnglish(val);
                            }
                        }
                        if (field === 'nameEng') updated.nameEng = String(val).toUpperCase();
                        if (field === 'passportNo') updated.passportNo = String(val).toUpperCase();
                        if (field === 'nation') updated.nation = String(val).toUpperCase();
                        return updated;
                    }
                    return t;
                }));
            };

            // [핵심] A4 규격에 맞는 페이지 분할 및 더미 데이터 생성 (황금비율 유지)
            const TRAVELER_ROWS_PER_PAGE = 25; // 1페이지에 딱 맞게 들어가는 기준 인원
            const travelerPages = [];
            const totalTravelerPages = Math.max(1, Math.ceil(travelers.length / TRAVELER_ROWS_PER_PAGE));

            for (let i = 0; i < totalTravelerPages; i++) {
                const pageData = travelers.slice(i * TRAVELER_ROWS_PER_PAGE, (i + 1) * TRAVELER_ROWS_PER_PAGE);
                const emptyRowsNeeded = TRAVELER_ROWS_PER_PAGE - pageData.length;
                
                const paddedData = [...pageData];
                // 남은 빈 공간을 더미(Dummy) 로우로 채워 A4 서식을 무조건 유지함
                for(let j = 0; j < emptyRowsNeeded; j++) {
                    paddedData.push({ isDummy: true, id: `dummy-${i}-${j}` });
                }
                travelerPages.push({ pageIndex: i, data: paddedData });
            }

            // ==========================================
            // [TAB 2] 방 배정 (루밍리스트)
            // ==========================================
            const [isInternationalRooming, setIsInternationalRooming] = useState(true);
            const [activeSubTabRooming, setActiveSubTabRooming] = useState('text');
            const [rooms, setRooms] = useState([
                { id: 1, type: 'TWIN', roomNo: '', guests: [{name:"", engName:"", gender:"남", remark:""}, {name:"", engName:"", gender:"남", remark:""}] }
            ]);
            const [importTextRooming, setImportTextRooming] = useState("");

            const dragRoomItem = useRef();
            const dragOverRoomItem = useRef();

            const dragRoomStart = (e, position) => { dragRoomItem.current = position; e.target.closest('.room-row')?.classList.add('dragging'); };
            const dragRoomEnter = (e, position) => { dragOverRoomItem.current = position; };
            const dropRoom = (e) => {
                const tr = e.target.closest('.room-row');
                if (tr) tr.classList.remove('dragging');
                if (dragRoomItem.current === undefined || dragRoomItem.current === null || dragOverRoomItem.current === undefined || dragOverRoomItem.current === null) return;
                setRooms(prev => {
                    const copyRooms = [...prev];
                    const dragContent = copyRooms[dragRoomItem.current];
                    if (!dragContent) return prev;
                    copyRooms.splice(dragRoomItem.current, 1);
                    copyRooms.splice(dragOverRoomItem.current, 0, dragContent);
                    return copyRooms;
                });
                dragRoomItem.current = null; dragOverRoomItem.current = null;
            };
            const dragRoomEnd = (e) => { e.target.closest('.room-row')?.classList.remove('dragging'); dragRoomItem.current = null; dragOverRoomItem.current = null;};

            const roomStats = useMemo(() => {
                let total = 0, male = 0, female = 0;
                let roomCounts = { SINGLE: 0, TWIN: 0, TRIPLE: 0, QUAD: 0 };
                rooms.forEach(r => {
                    if (r.guests.some(g => g.name.trim() !== "")) roomCounts[r.type]++;
                    r.guests.forEach(g => {
                        if (g.name.trim() !== "") {
                            total++;
                            if (g.gender === '남') male++;
                            else female++;
                        }
                    });
                });
                return { total, male, female, roomCounts };
            }, [rooms]);

            const handleRoomingSmartImport = () => {
                if (!importTextRooming.trim()) return;
                const lines = importTextRooming.split('\n').filter(l => l.trim().length > 0);
                const newRooms = lines.map((line, idx) => {
                    const rawNames = line.split(/[\s,/\t]+/).map(name => name.trim()).filter(Boolean);
                    const guests = rawNames.map(raw => {
                        const hasFemale = raw.includes('(여)') || /여$/.test(raw);
                        const cleanName = raw.replace(/\(여\)|\(남\)|여$|남$/g, '').trim();
                        return { name: cleanName, engName: isInternationalRooming ? koreanToEnglish(cleanName) : "", gender: hasFemale ? "여" : "남", remark: "" };
                    });
                    let type = 'TWIN';
                    if (guests.length <= 1) type = 'SINGLE';
                    else if (guests.length === 2) type = 'TWIN';
                    else if (guests.length === 3) type = 'TRIPLE';
                    else type = 'QUAD';
                    return { id: Date.now() + Math.random(), roomNo: "", type, guests: guests.slice(0, type === 'SINGLE' ? 1 : type === 'TWIN' ? 2 : type === 'TRIPLE' ? 3 : 4) };
                });
                
                setRooms(prev => {
                    if (prev.length === 1 && prev[0].guests.every(g => g.name === "")) return newRooms;
                    return [...prev, ...newRooms];
                });
                setImportTextRooming("");
            };

            const updateRoom = (rIdx, field, value) => { 
                setRooms(prev => prev.map((room, idx) => idx === rIdx ? { ...room, [field]: value } : room)); 
            };
            
            const updateGuest = (globalIdx, gIdx, field, value) => {
                setRooms(prev => prev.map((room, rIndex) => {
                    if (rIndex === globalIdx) {
                        const newGuests = room.guests.map((guest, guestIndex) => {
                            if (guestIndex === gIdx) {
                                const updatedGuest = { ...guest, [field]: value };
                                if (field === 'name' && isInternationalRooming) {
                                    if (!guest.engName || guest.engName === koreanToEnglish(guest.name)) {
                                        updatedGuest.engName = koreanToEnglish(value);
                                    }
                                }
                                if (field === 'engName') updatedGuest.engName = String(value).toUpperCase();
                                return updatedGuest;
                            }
                            return guest;
                        });
                        return { ...room, guests: newGuests };
                    }
                    return room;
                }));
            };

            const changeRoomType = (globalIdx, type) => {
                setRooms(prev => prev.map((room, rIndex) => {
                    if (rIndex === globalIdx) {
                        const capacity = type === 'SINGLE' ? 1 : (type === 'TWIN' ? 2 : (type === 'TRIPLE' ? 3 : 4));
                        let currentGuests = [...room.guests];
                        if (currentGuests.length < capacity) {
                            while(currentGuests.length < capacity) currentGuests.push({ name: "", engName: "", gender: "남", remark: "" });
                        } else {
                            currentGuests = currentGuests.slice(0, capacity);
                        }
                        return { ...room, type, guests: currentGuests };
                    }
                    return room;
                }));
            };

            const removeRoom = (globalIdx) => setRooms(prev => prev.filter((_, idx) => idx !== globalIdx));
            const addRoom = () => setRooms(prev => [...prev, { id: Date.now() + Math.random(), roomNo: '', type: 'TWIN', guests: [{name:"", engName:"", gender:"남", remark:""}, {name:"", engName:"", gender:"남", remark:""}] }]);

            const ROOMS_PER_PAGE = 22;
            const roomPages = [];
            const totalRoomPages = Math.max(1, Math.ceil(rooms.length / ROOMS_PER_PAGE));
            for (let i = 0; i < totalRoomPages; i++) roomPages.push(rooms.slice(i * ROOMS_PER_PAGE, (i + 1) * ROOMS_PER_PAGE));

            // ==========================================
            // [데이터 저장/불러오기 및 공유 링크 생성]
            // ==========================================
            const exportData = () => {
                const dataToSave = { travelers, commonHeader, rooms };
                const blob = new Blob([JSON.stringify(dataToSave, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `투어메이커_데이터_${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };

            const importData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.travelers) setTravelers(data.travelers);
                        if (data.commonHeader) setCommonHeader(data.commonHeader);
                        if (data.rooms) setRooms(data.rooms);
                        alert("✅ 저장된 데이터를 성공적으로 불러왔습니다.");
                    } catch (error) {
                        alert("⚠️ 데이터를 읽는 중 오류가 발생했습니다. 올바른 파일인지 확인해주세요.");
                    }
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            const handleCopyLink = () => {
                const baseUrl = window.location.origin + window.location.pathname;
                const shareUrl = `${baseUrl}?shared=true`;
                
                fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(shareUrl)}`)
                    .then(res => res.json())
                    .then(data => {
                        const finalUrl = data.shorturl || shareUrl;
                        executeCopy(finalUrl);
                    })
                    .catch(() => {
                        executeCopy(shareUrl);
                    });
            };

            const executeCopy = (urlToCopy) => {
                const textArea = document.createElement("textarea");
                textArea.value = urlToCopy;
                textArea.style.position = "fixed";
                textArea.style.top = "-9999px";
                textArea.style.left = "-9999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                
                try {
                    const successful = document.execCommand('copy');
                    if(successful) {
                        alert(`✅ 담당자 공유용 단축 링크(${urlToCopy})가 복사되었습니다!\n이 링크로 접속하면 불필요한 기능이 숨겨진 '심플 작성 모드'로 열립니다.`);
                    } else {
                        prompt("브라우저 정책으로 자동 복사에 실패했습니다. 아래 주소를 직접 복사(Ctrl+C)해 주세요:", urlToCopy);
                    }
                } catch (err) {
                    prompt("브라우저 정책으로 자동 복사에 실패했습니다. 아래 주소를 직접 복사(Ctrl+C)해 주세요:", urlToCopy);
                } finally {
                    document.body.removeChild(textArea);
                }
            };

            const handlePrint = () => {
                if(isSharedMode) {
                    alert("PDF 파일로 인쇄 및 저장하신 후 투어메이커 담당자에게 전달해 주시면 즉시 공유하겠습니다.");
                }
                setTimeout(() => { window.print(); }, 100);
            };

            // ==========================================
            // 렌더링
            // ==========================================
            return (
                <div className="min-h-screen flex flex-col bg-slate-50">
                    {/* 상단 네비게이션 */}
                    <div className="no-print bg-[#1e293b] border-b shadow-md sticky top-0 z-50">
                        <div className="max-w-[1400px] mx-auto px-3 md:px-4 flex flex-col md:flex-row justify-between items-center py-2 md:py-0 gap-2 md:gap-3">
                            
                            <div className="flex w-full md:w-auto justify-center md:justify-start items-center pb-1 md:pb-0">
                                <div className="flex items-center gap-2 md:gap-3">
                                    <img src={TM_LOGO} className="h-5 md:h-6 filter brightness-0 invert" alt="Tourmaker Logo" />
                                    <div className="h-3 md:h-4 w-[1px] bg-slate-500"></div>
                                    <h1 className="font-bold text-white tracking-wide text-xs md:text-sm">통합 관리 센터</h1>
                                </div>
                            </div>
                            
                            <div className="flex w-full md:w-auto justify-center overflow-x-auto hide-scrollbar">
                                <button onClick={() => setActiveMainTab('traveler')} className={`whitespace-nowrap px-3 md:px-5 py-2 md:py-4 h-full flex items-center font-bold text-[13px] md:text-sm border-b-[3px] transition-all md:rounded-t-md ${activeMainTab === 'traveler' ? 'border-blue-400 text-white bg-slate-800' : 'border-transparent text-slate-400 hover:text-slate-200 hover:bg-slate-800'}`}>
                                    <i className="fas fa-passport mr-2"></i> 1. 여행자 명단
                                </button>
                                <button onClick={() => setActiveMainTab('rooming')} className={`whitespace-nowrap px-3 md:px-5 py-2 md:py-4 h-full flex items-center font-bold text-[13px] md:text-sm border-b-[3px] transition-all md:rounded-t-md ${activeMainTab === 'rooming' ? 'border-blue-400 text-white bg-slate-800' : 'border-transparent text-slate-400 hover:text-slate-200 hover:bg-slate-800'}`}>
                                    <i className="fas fa-bed mr-2"></i> 2. 방 배정 (루밍)
                                </button>
                            </div>

                            <div className="flex w-full md:w-auto justify-end gap-2 pt-1 md:pt-0 border-t border-slate-700 md:border-none">
                                {!isSharedMode && (
                                    <React.Fragment>
                                        <button onClick={handleCopyLink} className="text-slate-300 hover:text-white px-2 py-1.5 text-xs font-bold transition flex items-center gap-1" title="공유용 단축 링크 생성 및 복사">
                                            <i className="fas fa-link"></i> 링크 복사
                                        </button>
                                        <input type="file" id="json-upload" accept=".json" className="hidden" onChange={importData} />
                                        <label htmlFor="json-upload" className="cursor-pointer text-slate-300 hover:text-white px-2 py-1.5 text-xs font-bold transition flex items-center gap-1" title="저장했던 데이터 불러오기">
                                            <i className="fas fa-folder-open"></i> 불러오기
                                        </label>
                                        <button onClick={exportData} className="text-slate-300 hover:text-white px-2 py-1.5 text-xs font-bold transition flex items-center gap-1" title="현재 상태를 파일로 컴퓨터에 저장">
                                            <i className="fas fa-save"></i> 데이터 저장
                                        </button>
                                    </React.Fragment>
                                )}
                                <button onClick={handlePrint} className="bg-blue-600 text-white px-3 md:px-4 py-1.5 md:py-2 rounded font-bold text-xs md:text-sm hover:bg-blue-500 transition shadow flex items-center gap-2">
                                    <i className="fas fa-file-pdf"></i> PDF 인쇄
                                </button>
                            </div>
                        </div>
                    </div>

                    <main className="flex-grow p-0 sm:p-4 md:p-8">
                        {/* ========================================================================= */}
                        {/* TAB 1: 여행자 명단 */}
                        {/* ========================================================================= */}
                        <div className={activeMainTab === 'traveler' ? 'block' : 'hidden'}>
                            
                            {/* 안내 문구 (웹 전용) */}
                            <div className="no-print max-w-[1400px] mx-auto mb-3 flex flex-col gap-2 px-3 md:px-4 bg-blue-50 py-3 rounded border border-blue-100">
                                <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2">
                                    <p className="text-[11px] md:text-sm text-blue-800 font-bold leading-relaxed">
                                        <i className="fas fa-lightbulb text-amber-500 mr-2"></i>
                                        셀을 마우스로 클릭해 직접 타이핑하세요. (좌측 ≡ 드래그로 행 순서 변경 가능)
                                    </p>
                                    <div className="flex items-center gap-3 self-end sm:self-auto">
                                        <div className="flex items-center gap-2 bg-white px-2 py-1 rounded shadow-sm border border-slate-200">
                                            <span className="text-xs font-bold text-slate-500"><i className="fas fa-search-plus"></i> 글자 크기:</span>
                                            <button onClick={() => setDocFontSize(Math.max(8, docFontSize - 0.5))} className="w-5 h-5 flex justify-center items-center bg-slate-100 hover:bg-slate-200 rounded text-slate-600 font-bold">-</button>
                                            <span className="text-xs font-bold text-blue-600 w-10 text-center">{docFontSize}pt</span>
                                            <button onClick={() => setDocFontSize(Math.min(16, docFontSize + 0.5))} className="w-5 h-5 flex justify-center items-center bg-slate-100 hover:bg-slate-200 rounded text-slate-600 font-bold">+</button>
                                        </div>
                                        {!isSharedMode && (
                                            <button onClick={() => setTravelers([{ id: Date.now(), nameKor: "", nameEng: "", birth: "", gender: "M", passportNo: "", expiry: "", nation: "KOR", remark: "" }])} className="text-[10px] md:text-xs text-red-500 hover:text-red-700 font-bold underline"><i className="fas fa-trash-alt"></i> 전체 초기화</button>
                                        )}
                                        <span className="text-[11px] md:text-sm font-black text-slate-700 whitespace-nowrap">실 인원 <span className="text-blue-600 text-base md:text-lg">{travelers.length}</span> 명</span>
                                    </div>
                                </div>
                                <p className="text-[10px] md:text-[12px] font-bold text-red-600 leading-relaxed"><i className="fas fa-exclamation-circle mr-1"></i> 한글 이름을 입력하면 영문명이 자동으로 변환됩니다. 실제 여권과 대조하여 반드시 재확인 바랍니다.</p>
                            </div>

                            {/* [핵심] 페이지 분할 렌더링 영역 */}
                            {travelerPages.map((page) => (
                                <div key={page.pageIndex} className="print-page bg-white w-full max-w-full xl:max-w-[1400px] mx-auto shadow-xl p-3 sm:p-5 md:p-8 xl:px-12 flex flex-col border border-slate-200 mb-8" style={{ minHeight: '277mm' }}>
                                    
                                    <div className="table-wrapper flex-1 w-full relative">
                                        <table className="w-full border-collapse min-w-[900px]" style={{ fontSize: `${docFontSize}pt`, tableLayout: 'fixed' }}>
                                            {/* [핵심] 황금 비율 할당 (Colgroup) */}
                                            <colgroup>
                                                <col className="no-print w-[3%]" />
                                                <col style={{ width: '4%' }} />  {/* NO */}
                                                <col style={{ width: '10%' }} /> {/* 성명 */}
                                                <col style={{ width: '22%' }} /> {/* NAME */}
                                                <col style={{ width: '12%' }} /> {/* 생년월일 */}
                                                <col style={{ width: '5%' }} />  {/* 성별 */}
                                                <col style={{ width: '14%' }} /> {/* 여권번호 */}
                                                <col style={{ width: '12%' }} /> {/* 여권만료일 */}
                                                <col style={{ width: '7%' }} />  {/* 국적 */}
                                                <col style={{ width: '11%' }} /> {/* 비고 */}
                                                <col className="no-print w-[4%]" />
                                            </colgroup>

                                            <thead className="print:table-header-group">
                                                <tr>
                                                    <th colSpan="11" className="no-border-top bg-white p-0 pt-2 pb-4 md:pb-6 text-left">
                                                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end border-b-[3px] border-slate-900 pb-3 md:pb-4 mb-2 gap-4">
                                                            <div className="space-y-3 flex-1 w-full">
                                                                <h2 className="font-black tracking-tighter text-slate-900 mt-2" style={{ fontSize: `${docFontSize * 2.2}pt` }}>OVERSEAS TRAVELERS LIST</h2>
                                                                <div className="flex flex-col gap-1.5 font-bold text-slate-700 w-full print:max-w-none max-w-full sm:max-w-[600px]">
                                                                    <HeaderField label="GROUP NAME" value={commonHeader.groupName} onChange={(v) => setCommonHeader({ ...commonHeader, groupName: v })} fontSize={docFontSize} placeholder="소속 기관 및 단체명 입력" />
                                                                    <HeaderField label="DATE" value={commonHeader.date} onChange={(v) => setCommonHeader({ ...commonHeader, date: v })} fontSize={docFontSize} placeholder="YYYY.MM.DD - YYYY.MM.DD" />
                                                                    <HeaderField label="NATION/LOCAL" value={commonHeader.location} onChange={(v) => setCommonHeader({ ...commonHeader, location: v })} fontSize={docFontSize} placeholder="방문 국가 및 지역 입력" />
                                                                    <HeaderField label="NUMBER" value={commonHeader.number} onChange={(v) => setCommonHeader({ ...commonHeader, number: v })} fontSize={docFontSize} placeholder="총 인원수 입력 (예: 20명)" />
                                                                </div>
                                                            </div>
                                                            <div className="text-left sm:text-right flex flex-col items-start sm:items-end w-full sm:w-auto self-end">
                                                                <div className="text-red-500 font-black italic mb-1 md:mb-0 bg-red-50 px-3 py-1 border border-red-200" style={{ fontSize: `${Math.max(9, docFontSize - 1)}pt` }}>여권 만료일 최소 6개월 이상</div>
                                                                {totalTravelerPages > 1 && <div className="mt-2 text-slate-500 font-bold" style={{ fontSize: `${Math.max(8, docFontSize - 2)}pt` }}>Page {page.pageIndex + 1} / {totalTravelerPages}</div>}
                                                            </div>
                                                        </div>
                                                    </th>
                                                </tr>
                                                <tr className="text-slate-800 border-t-2 border-b-2 border-slate-800 bg-transparent">
                                                    <th className="no-print text-center"><i className="fas fa-sort text-slate-300"></i></th>
                                                    <th className="text-center font-bold">NO</th>
                                                    <th className="text-center font-bold">성명</th>
                                                    <th className="text-left font-bold pl-2">NAME</th>
                                                    <th className="text-center font-bold">생년월일</th>
                                                    <th className="text-center font-bold">성별</th>
                                                    <th className="text-center font-bold">여권번호</th>
                                                    <th className="text-center font-bold whitespace-nowrap">여권만료일</th>
                                                    <th className="text-center font-bold">국적</th>
                                                    <th className="text-left font-bold">기타</th>
                                                    <th className="no-print text-center font-bold">삭제</th>
                                                </tr>
                                            </thead>

                                            <tbody className="print:table-row-group text-slate-800">
                                                {page.data.map((t, localIdx) => {
                                                    const actualIdx = (page.pageIndex * TRAVELER_ROWS_PER_PAGE) + localIdx + 1;
                                                    
                                                    // 빈 줄(더미 로우) 렌더링
                                                    if (t.isDummy) {
                                                        return (
                                                            <tr key={t.id} className="border-b border-slate-200 bg-white fixed-row-height">
                                                                <td className="no-print"></td>
                                                                <td className="text-center text-slate-300 font-normal" style={{ fontSize: `${docFontSize - 1}pt` }}>{actualIdx}</td>
                                                                <td className="border-r border-slate-200"></td>
                                                                <td className="border-r border-slate-200"></td>
                                                                <td className="border-r border-slate-200"></td>
                                                                <td className="border-r border-slate-200"></td>
                                                                <td className="border-r border-slate-200"></td>
                                                                <td className="border-r border-slate-200"></td>
                                                                <td className="border-r border-slate-200 text-center text-slate-300 font-light" style={{ fontSize: `${docFontSize - 2}pt` }}></td>
                                                                <td className=""></td>
                                                                <td className="no-print"></td>
                                                            </tr>
                                                        );
                                                    }

                                                    // 실제 데이터 렌더링
                                                    const status = getExpiryStatus(t.expiry);
                                                    const globalIdx = actualIdx - 1; // 0-based index for drag/drop
                                                    
                                                    return (
                                                        <tr key={t.id} className="border-b border-slate-200 hover:bg-slate-50 transition group bg-white fixed-row-height" draggable onDragStart={(e) => dragStart(e, globalIdx)} onDragEnter={(e) => dragEnter(e, globalIdx)} onDragEnd={dragEnd} onDrop={drop} onDragOver={(e) => e.preventDefault()}>
                                                            <td className="no-print text-center text-slate-300 hover:text-blue-500 drag-handle" title="드래그하여 순서 변경">
                                                                <i className="fas fa-bars"></i>
                                                            </td>
                                                            <td className="text-center text-slate-500 font-bold">{actualIdx}</td>
                                                            <td className="border-r border-slate-200 text-center">
                                                                <EditableCell val={t.nameKor} onChange={(v) => updateField(t.id, 'nameKor', v)} bold center fontSize={docFontSize} />
                                                            </td>
                                                            <td className="border-r border-slate-200 pl-2">
                                                                <EditableCell val={t.nameEng} onChange={(v) => updateField(t.id, 'nameEng', v.toUpperCase())} uppercase fontSize={docFontSize} />
                                                            </td>
                                                            <td className="border-r border-slate-200 text-center">
                                                                <EditableCell val={t.birth} onChange={(v) => updateField(t.id, 'birth', v)} placeholder="YYYY-MM-DD" center fontSize={docFontSize} />
                                                            </td>
                                                            <td className="border-r border-slate-200 text-center">
                                                                <select className="bg-transparent border-none outline-none cursor-pointer text-slate-700 font-bold editable-cell-input text-center w-full p-0" style={{ fontSize: 'inherit' }} value={t.gender} onChange={(e) => updateField(t.id, 'gender', e.target.value)}>
                                                                    <option value="M">M</option>
                                                                    <option value="F">F</option>
                                                                </select>
                                                            </td>
                                                            <td className="border-r border-slate-200 text-center">
                                                                <EditableCell val={t.passportNo} onChange={(v) => updateField(t.id, 'passportNo', v.toUpperCase())} uppercase center fontSize={docFontSize} />
                                                            </td>
                                                            <td className={`border-r border-slate-200 text-center ${status.color}`}>
                                                                <div className="flex items-center justify-center gap-1 w-full relative">
                                                                    <EditableCell val={t.expiry} onChange={(v) => updateField(t.id, 'expiry', v)} placeholder="YYYY-MM-DD" center fontSize={docFontSize} />
                                                                    {status.warning && <i className="fas fa-exclamation-triangle text-orange-400 no-print absolute right-1" title={status.msg}></i>}
                                                                </div>
                                                            </td>
                                                            <td className="border-r border-slate-200 text-center">
                                                                <EditableCell val={t.nation} onChange={(v) => updateField(t.id, 'nation', v)} uppercase center fontSize={docFontSize} />
                                                            </td>
                                                            <td className="pl-1">
                                                                <EditableCell val={t.remark} onChange={(v) => updateField(t.id, 'remark', v)} fontSize={docFontSize} />
                                                            </td>
                                                            <td className="no-print text-center">
                                                                <button onClick={() => removeTraveler(t.id)} className="text-slate-300 hover:text-red-500 transition px-1"><i className="fas fa-trash-alt"></i></button>
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                    
                                    {/* 각 페이지별 푸터 삽입 (출력 시 하단 고정) */}
                                    <div className="print-footer border-t border-slate-300 w-full mt-4">
                                        <div className="flex justify-between items-end mb-3">
                                            <div className="font-bold text-slate-500" style={{ fontSize: `${Math.max(8, docFontSize - 2)}pt` }}>제출일: {new Date().toLocaleDateString()}</div>
                                            <div className="text-right">
                                                <a href="https://tourmaker.kr" target="_blank" rel="noreferrer">
                                                    <img src={TM_LOGO} className="h-5 md:h-6 opacity-80 hover:opacity-100 transition" alt="Tourmaker Logo" />
                                                </a>
                                            </div>
                                        </div>
                                        <div className="bg-[#f8f9fa] py-3 rounded-lg text-center border border-slate-100">
                                            <p className="text-[#6c757d] leading-relaxed m-0" style={{ fontSize: `${Math.max(8, docFontSize - 2)}pt` }}>
                                                [System Powered by <a href="https://tourmaker.kr" target="_blank" rel="noreferrer" className="font-bold underline text-[#6c757d]">TOURMAKER</a>] 본 시스템은 투어메이커의 기획과 트래블 테크 기술 제휴로 제작되었습니다.
                                            </p>
                                        </div>
                                    </div>

                                </div>
                            ))}

                            <div className="no-print mt-6 mb-12 flex justify-center">
                                <button onClick={addEmptyTraveler} className="bg-white border-2 border-dashed border-blue-300 text-blue-600 font-bold text-sm px-10 py-4 rounded-xl flex items-center gap-2 hover:bg-blue-50 transition shadow-sm">
                                    <i className="fas fa-plus text-lg"></i> 실제 탑승객 빈칸 1줄 추가
                                </button>
                            </div>
                        </div>

                        {/* ========================================================================= */}
                        {/* TAB 2: 방 배정 (루밍리스트) - 기존 코드 유지 보수 */}
                        {/* ========================================================================= */}
                        <div className={activeMainTab === 'rooming' ? 'block' : 'hidden'}>
                            {/* 기존 방배정 UI 유지 ... (생략 없이 원본 유지) */}
                            <div className="w-full max-w-full xl:max-w-[1400px] mx-auto p-0 sm:p-4 md:p-6 print-rooming-list">
                                <div className="no-print mb-4 md:mb-6">
                                    <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-3 md:mb-4">
                                        <div className="flex bg-white p-1 rounded-lg border border-slate-200 shadow-sm w-full sm:w-auto">
                                            <button onClick={() => setIsInternationalRooming(false)} className={`flex-1 sm:flex-none px-3 md:px-4 py-1.5 rounded text-xs md:text-sm font-bold transition ${!isInternationalRooming ? 'bg-blue-50 text-blue-600' : 'text-slate-500'}`}>국내행사 (한글만)</button>
                                            <button onClick={() => setIsInternationalRooming(true)} className={`flex-1 sm:flex-none px-3 md:px-4 py-1.5 rounded text-xs md:text-sm font-bold transition ${isInternationalRooming ? 'bg-blue-50 text-blue-600' : 'text-slate-500'}`}>해외행사 (영문포함)</button>
                                        </div>
                                        
                                        <div className="flex items-center gap-2">
                                            <div className="flex items-center gap-2 bg-white px-2 py-1.5 rounded shadow-sm border border-slate-200 mr-2">
                                                <span className="text-xs font-bold text-slate-500"><i className="fas fa-search-plus"></i> 글자 크기:</span>
                                                <button onClick={() => setDocFontSize(Math.max(8, docFontSize - 0.5))} className="w-5 h-5 flex justify-center items-center bg-slate-100 hover:bg-slate-200 rounded text-slate-600 font-bold">-</button>
                                                <span className="text-xs font-bold text-blue-600 w-10 text-center">{docFontSize}pt</span>
                                                <button onClick={() => setDocFontSize(Math.min(16, docFontSize + 0.5))} className="w-5 h-5 flex justify-center items-center bg-slate-100 hover:bg-slate-200 rounded text-slate-600 font-bold">+</button>
                                            </div>

                                            <button onClick={() => setIsNavMenuOpen(!isNavMenuOpen)} className="bg-white border border-slate-200 text-slate-600 hover:text-blue-600 px-4 py-2 rounded-lg text-xs md:text-sm font-bold transition shadow-sm flex items-center gap-2 w-full sm:w-auto justify-center">
                                                <i className={`fas fa-chevron-${isNavMenuOpen ? 'up' : 'down'}`}></i> 작성 가이드 {isNavMenuOpen ? '닫기' : '열기'}
                                            </button>
                                        </div>
                                    </div>

                                    {isNavMenuOpen && (
                                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                            <div className="flex border-b border-slate-200">
                                                <button onClick={() => setActiveSubTabRooming('text')} className={`flex-1 py-2.5 md:py-3 text-xs md:text-sm font-bold flex justify-center items-center gap-1.5 md:gap-2 transition ${activeSubTabRooming === 'text' ? 'bg-blue-50 text-blue-700 border-b-2 border-blue-600' : 'bg-white text-slate-500 hover:bg-slate-50'}`}>
                                                    <i className="fas fa-keyboard"></i> 텍스트로 명단 붙여넣기
                                                </button>
                                                <button onClick={() => setActiveSubTabRooming('pdf')} className={`flex-1 py-2.5 md:py-3 text-xs md:text-sm font-bold flex justify-center items-center gap-1.5 md:gap-2 transition ${activeSubTabRooming === 'pdf' ? 'bg-blue-50 text-blue-700 border-b-2 border-blue-600' : 'bg-white text-slate-500 hover:bg-slate-50'}`}>
                                                    <i className="fas fa-file-pdf"></i> 작성된 명단(PDF) 추출
                                                </button>
                                            </div>

                                            <div className="p-4 md:p-5">
                                                {activeSubTabRooming === 'pdf' ? (
                                                    <div className="flex flex-col items-center justify-center py-6 md:py-8 text-center border-2 border-dashed border-slate-200 rounded-lg bg-slate-50 px-4">
                                                        <div className="w-10 h-10 md:w-12 md:h-12 bg-white rounded-full flex items-center justify-center shadow-sm mb-3"><i className="fas fa-file-import text-blue-500 text-lg md:text-xl"></i></div>
                                                        <h4 className="font-bold text-slate-800 mb-2 text-xs md:text-sm">기존에 작성해두신 PDF 파일을 올려주세요</h4>
                                                        <p className="text-[11px] md:text-xs text-slate-500 mb-5 max-w-md leading-relaxed">
                                                            기존에 임의로 작성해두신 방배정표 파일(PDF)이 있다면 올려주세요.<br/>
                                                            시스템이 사람 이름만 쏙쏙 골라 공식 양식으로 자동 변환해 드립니다.<br/>
                                                            <span className="text-red-500 font-bold mt-2 block">※ 인식의 오류로 정확히 반영이 안될 수도 있으니 변환 후 꼭 확인해주세요.</span>
                                                        </p>
                                                        <input type="file" id="rooming-upload" accept=".pdf" className="hidden" onChange={handleRoomingSmartImport} />
                                                        <label htmlFor="rooming-upload" className="cursor-pointer bg-blue-600 text-white px-5 md:px-6 py-2 md:py-2.5 rounded font-bold text-xs md:text-sm hover:bg-blue-700 transition shadow-sm">PC에서 PDF 찾아보기</label>
                                                    </div>
                                                ) : (
                                                    <div className="flex flex-col md:flex-row gap-4 md:gap-6">
                                                        <div className="md:w-1/3">
                                                            <h4 className="font-bold mb-2 text-slate-800 text-xs md:text-sm flex items-center gap-2"><i className="fas fa-circle-info text-blue-500"></i> 한 줄에 한 객실씩 입력</h4>
                                                            <ul className="space-y-1.5 text-[11px] md:text-xs text-slate-600">
                                                                <li>1. 메모장 쓰듯 <b>한 줄에 한 방</b> 인원을 적어주세요.</li>
                                                                <li>2. 성별 구분 없이 편하게 나열하셔도 됩니다.</li>
                                                                <li>3. 이름이 많아지면 <b>창이 자동으로 늘어납니다.</b></li>
                                                                <li className="text-blue-600 font-bold mt-2 pt-2 border-t border-slate-200">※ 한 줄에 1명은 1인실, 2명은 2인실, 3명은 3인실로 자동 배정됩니다.</li>
                                                            </ul>
                                                        </div>
                                                        <div className="flex-1 flex flex-col">
                                                            <AutoResizeTextarea 
                                                                placeholder="참가자1 참가자2&#10;참가자3 참가자4&#10;인솔자" 
                                                                value={importTextRooming} 
                                                                onChange={setImportTextRooming} 
                                                                minRows={4}
                                                            />
                                                            <button onClick={handleRoomingSmartImport} className="w-full mt-3 py-2.5 md:py-3 bg-slate-800 text-white text-xs md:text-sm font-bold rounded-lg hover:bg-black transition shadow-sm border border-slate-900">
                                                                <i className="fas fa-wand-magic-sparkles mr-2"></i> 방 배정표 자동 생성
                                                            </button>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div className="space-y-6 print:space-y-0">
                                    {roomPages.map((pageRooms, pageIndex) => {
                                        const leftTableRooms = pageRooms.slice(0, Math.ceil(pageRooms.length / 2));
                                        const rightTableRooms = pageRooms.slice(Math.ceil(pageRooms.length / 2));
                                        const pageStartIndex = pageIndex * ROOMS_PER_PAGE;

                                        return (
                                            <div key={pageIndex} className={`print-page bg-white shadow-xl p-3 sm:p-5 md:p-8 border-t-[4px] md:border-t-[6px] border-slate-800 print:shadow-none print:p-0 print:border-none print:m-0 relative flex flex-col justify-between`} style={{ minHeight: '277mm', fontSize: `${docFontSize}pt` }}>
                                                <div className="flex-1 flex flex-col">
                                                    <div className="flex flex-col md:flex-row print:flex-row justify-between items-start md:items-end border-b-2 border-slate-800 pb-2 mb-3 gap-2 md:gap-4">
                                                        <div className="space-y-1.5 flex-1 min-w-0 w-full mt-1 max-w-full md:max-w-[500px]">
                                                            <HeaderField label="GROUP" value={commonHeader.groupName} onChange={(v) => setCommonHeader({ ...commonHeader, groupName: v })} isMain={true} fontSize={docFontSize} placeholder="단체명 입력" />
                                                            <HeaderField label="DATE" value={commonHeader.date} onChange={(v) => setCommonHeader({ ...commonHeader, date: v })} fontSize={docFontSize} placeholder="일정 입력" />
                                                            <HeaderField label="LOCATION" value={commonHeader.location} onChange={(v) => setCommonHeader({ ...commonHeader, location: v })} fontSize={docFontSize} placeholder="지역 입력" />
                                                            
                                                            <div className="flex items-center group w-full mt-1 md:mt-0">
                                                                <span className="font-black text-slate-500 tracking-widest uppercase flex-shrink-0 whitespace-nowrap" style={{ fontSize: `${Math.max(8, docFontSize - 1.5)}pt`, width: `${Math.max(140, docFontSize * 11)}px` }}>TOTAL PAX</span>
                                                                <div className="font-bold text-slate-800 flex-1 flex flex-col sm:flex-row sm:items-center gap-1 md:gap-3 px-1 md:px-2" style={{ fontSize: `${docFontSize}pt` }}>
                                                                    <div className="flex items-center gap-2">
                                                                        <span className="bg-slate-100 px-2 py-0.5 rounded border border-slate-200">총 인원: <span className="text-blue-600">{roomStats.total}</span>명</span>
                                                                        <span className="text-slate-500" style={{ fontSize: `${Math.max(8, docFontSize - 1)}pt` }}>( 남 {roomStats.male}명 / 여 {roomStats.female}명 )</span>
                                                                    </div>
                                                                    <div className="flex items-center gap-1.5 ml-0 sm:ml-2">
                                                                        <span className="bg-blue-50 text-blue-700 px-1.5 py-0.5 rounded border border-blue-200">TWN: {roomStats.roomCounts.TWIN}</span>
                                                                        <span className="bg-amber-50 text-amber-700 px-1.5 py-0.5 rounded border border-amber-200">TRP: {roomStats.roomCounts.TRIPLE}</span>
                                                                        <span className="bg-emerald-50 text-emerald-700 px-1.5 py-0.5 rounded border border-emerald-200">SGL: {roomStats.roomCounts.SINGLE}</span>
                                                                        {roomStats.roomCounts.QUAD > 0 && <span className="bg-violet-50 text-violet-700 px-1.5 py-0.5 rounded border border-violet-200">QAD: {roomStats.roomCounts.QUAD}</span>}
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <div className="text-left md:text-right flex-shrink-0 flex flex-col items-start md:items-end print:text-right w-full md:w-auto border-t border-slate-200 md:border-none pt-2 md:pt-0 mt-2 md:mt-0">
                                                            <h2 className="font-black italic tracking-tighter text-slate-800 leading-none" style={{ fontSize: `${docFontSize * 2}pt` }}>ROOMING LIST</h2>
                                                            {totalRoomPages > 1 && <span className="font-bold text-slate-400 mt-1" style={{ fontSize: `${Math.max(8, docFontSize - 2)}pt` }}>Page {pageIndex + 1} / {totalRoomPages}</span>}
                                                        </div>
                                                    </div>

                                                    <div className="flex justify-between items-center mb-2 md:mb-3 gap-2">
                                                        {isInternationalRooming ? <p className="font-bold text-red-600 no-print" style={{ fontSize: `${Math.max(9, docFontSize - 1)}pt` }}><i className="fas fa-exclamation-circle mr-1"></i> 한글 입력 시 자동 변환된 영문명은 실제 여권과 상이할 수 있으므로 반드시 재확인 바랍니다.</p> : <div></div>}
                                                    </div>

                                                    <div className="table-wrapper flex-1">
                                                        <div className="grid grid-cols-1 lg:grid-cols-2 print:grid-cols-2 gap-x-8 gap-y-4 w-full min-w-[700px] lg:min-w-0">
                                                            <RoomTable rooms={leftTableRooms} startIndex={pageStartIndex} updateRoom={updateRoom} updateGuest={updateGuest} changeRoomType={changeRoomType} removeRoom={removeRoom} isInternational={isInternationalRooming} globalRooms={rooms} dragRoomStart={dragRoomStart} dragRoomEnter={dragRoomEnter} dragRoomEnd={dragRoomEnd} dropRoom={dropRoom} fontSize={docFontSize} />
                                                            <RoomTable rooms={rightTableRooms} startIndex={pageStartIndex + leftTableRooms.length} updateRoom={updateRoom} updateGuest={updateGuest} changeRoomType={changeRoomType} removeRoom={removeRoom} isInternational={isInternationalRooming} globalRooms={rooms} dragRoomStart={dragRoomStart} dragRoomEnter={dragRoomEnter} dragRoomEnd={dragRoomEnd} dropRoom={dropRoom} fontSize={docFontSize} />
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="print-footer border-t border-slate-300 w-full">
                                                    <div className="flex justify-between items-end mb-3 md:mb-4">
                                                        <div className="font-bold text-slate-500" style={{ fontSize: `${Math.max(8, docFontSize - 2)}pt` }}>제출일: {new Date().toLocaleDateString()}</div>
                                                        <div className="text-right">
                                                            <a href="https://tourmaker.kr" target="_blank" rel="noreferrer">
                                                                <img src={TM_LOGO} className="h-5 md:h-6 opacity-80 hover:opacity-100 transition" alt="Tourmaker Logo" />
                                                            </a>
                                                        </div>
                                                    </div>
                                                    <div className="bg-[#f8f9fa] py-3 md:py-4 px-4 md:px-6 rounded-lg text-center border border-slate-100">
                                                        <p className="text-[#6c757d] leading-relaxed m-0" style={{ fontSize: `${Math.max(8, docFontSize - 2)}pt` }}>
                                                            [System Powered by <a href="https://tourmaker.kr" target="_blank" rel="noreferrer" className="font-bold underline text-[#6c757d]">TOURMAKER</a>] 본 시스템은 투어메이커의 기획과 트래블 테크 기술 제휴로 제작되었습니다.
                                                        </p>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>

                                <div className="no-print mt-6 md:mt-8 flex justify-center">
                                    <button onClick={addRoom} className="bg-white border-2 border-dashed border-blue-300 text-blue-600 px-6 md:px-10 py-3 md:py-4 rounded-xl font-bold text-xs md:text-sm hover:bg-blue-50 hover:border-blue-500 transition-all shadow-sm">
                                        <i className="fas fa-bed text-lg md:text-xl mr-2"></i> 빈 객실 추가하기
                                    </button>
                                </div>
                            </div>
                        </div>

                    </main>
                </div>
            );
        };

        const HeaderField = ({ label, value = "", onChange, isMain = false, fontSize, placeholder = "" }) => (
            <div className="flex items-center gap-2 print:gap-4 w-full">
                <span className={`font-black text-slate-500 tracking-widest uppercase flex-shrink-0 whitespace-nowrap`} 
                      style={{ fontSize: `${isMain ? Math.max(9, fontSize - 1) : Math.max(8, fontSize - 1.5)}pt`, width: `${Math.max(140, fontSize * 11)}px` }}>
                    {label}
                </span>
                <input 
                    type="text" 
                    className={`flex-1 border-b border-transparent hover:border-slate-300 focus:border-blue-500 outline-none px-2 transition-all text-slate-800 ${isMain ? 'font-black' : 'font-bold'}`}
                    style={{ fontSize: `${isMain ? fontSize + 4 : fontSize}pt` }}
                    value={value} 
                    placeholder={placeholder}
                    onChange={(e) => onChange(e.target.value)} 
                />
            </div>
        );

        const EditableCell = ({ val = "", onChange, bold = false, uppercase = false, placeholder = '', center = false, fontSize }) => (
            <input 
                type="text"
                title="클릭하여 내용을 수정하세요"
                className={`editable-cell-input bg-transparent outline-none border-b border-transparent focus:border-blue-400 p-0 m-0 ${bold ? 'font-black text-slate-900' : ''} ${uppercase ? 'uppercase' : ''} ${center ? 'text-center' : 'text-left'}`}
                style={{ fontSize: 'inherit' }}
                value={val}
                placeholder={placeholder}
                onChange={(e) => onChange(e.target.value)}
            />
        );

        const ROOM_GRID_COLS = "grid-cols-[6%_12%_64%_18%]";

        const RoomTable = ({ rooms, startIndex, updateRoom, updateGuest, changeRoomType, removeRoom, isInternational, globalRooms, dragRoomStart, dragRoomEnter, dragRoomEnd, dropRoom, fontSize }) => (
            <div className="border-t-[2px] border-slate-800 room-table-container w-full" style={{ breakInside: 'avoid' }}>
                <div className={`grid ${ROOM_GRID_COLS} bg-slate-100 border-b border-slate-300 font-black py-2 px-1 text-center uppercase tracking-widest text-slate-600`} style={{ fontSize: `${Math.max(8, fontSize - 2)}pt` }}>
                    <div className="no-print"></div><div>No</div><div>Guest Info</div><div>Room No</div>
                </div>
                {rooms.map((room, rIdx) => {
                    const actualIdx = startIndex + rIdx;
                    const globalIdx = globalRooms ? globalRooms.findIndex(r => r.id === room.id) : actualIdx;
                    
                    return (
                        <div 
                            key={`${actualIdx}-${room.id}`} 
                            className={`room-row grid ${ROOM_GRID_COLS} border-b border-slate-200 group relative bg-white`}
                            style={{ breakInside: 'avoid' }}
                            draggable
                            onDragStart={(e) => dragRoomStart(e, globalIdx)}
                            onDragEnter={(e) => dragRoomEnter(e, globalIdx)}
                            onDragEnd={dragRoomEnd}
                            onDrop={dropRoom}
                            onDragOver={(e) => e.preventDefault()}
                        >
                            <div className="no-print flex items-center justify-center border-r border-slate-100 text-slate-300 hover:text-blue-500 drag-handle" title="드래그하여 방 순서 변경">
                                <i className="fas fa-bars"></i>
                            </div>

                            <div className="flex flex-col items-center justify-center bg-slate-50 border-r border-slate-100 py-1">
                                <span className="font-black text-slate-800" style={{ fontSize: `${fontSize}pt` }}>{actualIdx + 1}</span>
                                <select className="no-print mt-0.5 font-bold text-slate-400 bg-transparent outline-none cursor-pointer" style={{ fontSize: `${Math.max(7, fontSize - 3)}pt` }} value={room.type} onChange={(e) => changeRoomType(globalIdx, e.target.value)}>
                                    <option value="TWIN">TWN</option><option value="TRIPLE">TRP</option><option value="SINGLE">SGL</option><option value="QUAD">QUAD</option>
                                </select>
                            </div>
                            
                            <div className="flex flex-col py-0.5 bg-white min-w-0">
                                {room.guests.map((g, gIdx) => (
                                    <div key={gIdx} className={`flex flex-col px-1.5 md:px-2 py-1 ${gIdx > 0 ? 'border-t border-slate-100' : ''}`} style={{ padding: `${fontSize/2.5}px 4px` }}>
                                        <div className="flex items-center gap-1 md:gap-2 mb-0.5 w-full">
                                            <input className="font-bold outline-none bg-transparent focus:text-blue-600" style={{ fontSize: `${fontSize}pt`, width: `${fontSize * 4.5}px` }} value={g.name} placeholder="이름" onChange={(e) => updateGuest(globalIdx, gIdx, 'name', e.target.value)} />
                                            <button type="button" onClick={() => updateGuest(globalIdx, gIdx, 'gender', g.gender === '남' ? '여' : '남')} className={`flex-shrink-0 font-bold px-1.5 py-0.5 rounded cursor-pointer ${g.gender === '여' ? 'bg-pink-50 text-pink-600' : 'bg-blue-50 text-blue-600'}`} style={{ fontSize: `${Math.max(8, fontSize - 2)}pt` }}>
                                                {g.gender}
                                            </button>
                                            <input className="flex-1 min-w-[30px] text-slate-500 outline-none bg-transparent col-remark" style={{ fontSize: `${Math.max(9, fontSize - 1)}pt` }} placeholder="비고" value={g.remark} onChange={(e) => updateGuest(globalIdx, gIdx, 'remark', e.target.value)} />
                                        </div>
                                        {isInternational && (
                                            <input className="font-medium tracking-wide text-slate-400 outline-none uppercase bg-transparent w-full" style={{ fontSize: `${Math.max(9, fontSize - 1)}pt` }} placeholder="ENGLISH NAME" value={g.engName} onChange={(e) => updateGuest(globalIdx, gIdx, 'engName', e.target.value)} />
                                        )}
                                    </div>
                                ))}
                            </div>
                            
                            <div className="border-l border-slate-100 flex items-center justify-center p-1 bg-white min-w-0">
                                <input className="w-full text-center font-bold text-slate-600 bg-transparent outline-none" style={{ fontSize: `${fontSize}pt` }} placeholder="추후 배정" value={room.roomNo} onChange={(e) => updateRoom(globalIdx, 'roomNo', e.target.value)} />
                            </div>
                            
                            <button type="button" onClick={() => removeRoom(globalIdx)} className="no-print absolute -left-4 md:-left-5 top-1/2 -translate-y-1/2 p-1 bg-white border border-slate-200 rounded-full text-slate-400 hover:text-red-500 opacity-0 group-hover:opacity-100 z-10"><i className="fas fa-trash-alt" style={{ fontSize: `${Math.max(8, fontSize - 2)}pt` }}></i></button>
                        </div>
                    );
                })}
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
