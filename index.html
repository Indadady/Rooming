    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; overflow-x: hidden; }

            th, td { border: none !important; border-bottom: 1px solid #cbd5e1 !important; padding: 3px 2px !important; word-wrap: break-word !important; word-break: keep-all !important; vertical-align: middle;}

<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useMemo, useEffect } = React;

        const TM_LOGO = "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgHfgIX70O5k6Anuo0UgALIdaG9jSga9auHu3uyz0uEirylGPAJnjN_qQbvEGMUvPqUQf_g9FMNUHRxlDcUBf4vZ3Mpy4TnA9WxbmzWYK11gt2zuy_Irl4wctNFjcjLyPo0GPXV792o_J7L9guRMuDfeC1gy7USwywjYbECZgzcsHybuGRRAXAnO1eNmP8/s320/logo.png";
        const TM_FOOTER_LOGO = "https://blogger.googleusercontent.com/img/a/AVvXsEitI-Z-hD82keOJ1AqHw-VTZjpw2U-O5UjtV9h3zblyG0wjsVfBWe9X9o0Q_Spctrt7krkd9qXO0xKTmGJLw4gyMZrRqpshKMFttnyx6OcC8-IGz3XLUZpGQOnRqVdol8jz5HuoDLqsEifnVRhcjUJHm13Sz8JrX9aPswMNUwZPvGtJEnQjhc2PiXlo-B8";

        const ADMIN_PASSWORD = "tourmaker2026";

        const generateEventCode = () => Math.random().toString(36).substring(2, 8).toUpperCase();

        const getRomanization = (char) => {
            const CHO = ["G","KK","N","D","TT","R","M","B","PP","S","SS","","J","JJ","CH","K","T","P","H"];
            const JUNG = ["A","AE","YA","YAE","EO","E","YEO","YE","O","WA","WAE","OE","YO","U","WO","WE","WI","YU","EU","UI","I"];
            const JONG = ["","K","K","K","N","N","N","T","L","L","M","P","L","L","P","L","M","P","P","T","T","NG","T","T","K","T","P","T"];
            const code = char.charCodeAt(0) - 0xAC00;
            if (code < 0 || code > 11171) return char; 
            return CHO[Math.floor(code / 588)] + JUNG[Math.floor((code % 588) / 28)] + JONG[code % 28];
        }

        const koreanToEnglish = (name) => {
            if (!name) return "";
            const fNames = {"김":"KIM", "이":"LEE", "박":"PARK", "최":"CHOI", "정":"JUNG", "강":"KANG", "조":"CHO", "윤":"YOON", "장":"JANG", "임":"LIM", "홍":"HONG", "송":"SONG", "오":"OH", "서":"SEO", "신":"SHIN", "권":"KWON", "황":"HWANG", "안":"AHN", "유":"YOO", "전":"JEON", "배":"BAE", "고":"KO", "문":"MOON", "양":"YANG", "손":"SON", "백":"BAEK", "허":"HEO", "남":"NAM", "심":"SHIM", "노":"NOH", "하":"HA", "곽":"KWAK", "성":"SUNG", "차":"CHA", "주":"JOO", "우":"WOO", "구":"KOO", "나":"NA", "민":"MIN", "엄":"EOM", "채":"CHAE", "원":"WON", "방":"BANG", "공":"KONG"};
            const char1 = name.charAt(0);
            const engFamily = fNames[char1] || getRomanization(char1);
            let engGiven = "";
            for(let i = 1; i < name.length; i++) engGiven += getRomanization(name.charAt(i));
            return `${engFamily} ${engGiven}`.trim(); 
        };

        const AutoResizeTextarea = ({ value, onChange, placeholder, minRows = 4 }) => {
            const textareaRef = useRef(null);
            const handleChange = (e) => onChange(e.target.value);
            useEffect(() => {
                if (textareaRef.current) {
                    textareaRef.current.style.height = 'auto';
                    textareaRef.current.style.height = Math.max(textareaRef.current.scrollHeight, minRows * 24 + 32) + 'px';
                }
            }, [value, minRows]);
            return <textarea ref={textareaRef} className="w-full p-3 md:p-4 text-xs md:text-sm bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition font-mono leading-relaxed resize-none overflow-hidden" placeholder={placeholder} value={value} onChange={handleChange} rows={minRows} />;
        };

        const HeaderField = ({ label, value = "", onChange, isMain = false, fontSize, placeholder = "", readOnly = false }) => (
            <div className="flex items-center gap-2 print:gap-4 w-full box-border">
                <span className={`font-black text-slate-500 tracking-widest uppercase flex-shrink-0 whitespace-nowrap`} 
                      style={{ fontSize: `${isMain ? Math.max(9, fontSize - 1) : Math.max(8, fontSize - 1.5)}pt`, width: `${Math.max(140, fontSize * 11)}px` }}>
                    {label}
                </span>
                <input 
                    type="text" 
                    className={`flex-1 min-w-0 border-b border-transparent ${readOnly ? '' : 'hover:border-slate-300 focus:border-blue-500'} outline-none px-2 transition-all text-slate-800 ${isMain ? 'font-black' : 'font-bold'}`}
                    style={{ fontSize: `${isMain ? fontSize + 4 : fontSize}pt` }}
                    value={value} 
                    placeholder={placeholder}
                    onChange={(e) => !readOnly && onChange(e.target.value)} 
                    readOnly={readOnly}
                />
            </div>
        );

        const EditableCell = ({ val = "", onChange, bold = false, uppercase = false, placeholder = '', center = false, fontSize }) => (
            <input 
                type="text"
                title="클릭하여 내용을 수정하세요"
                className={`editable-cell-input bg-transparent outline-none border-b border-transparent focus:border-blue-400 p-0 m-0 ${bold ? 'font-black text-slate-900' : ''} ${uppercase ? 'uppercase' : ''} ${center ? 'text-center' : 'text-left'}`}
                style={{ fontSize: 'inherit' }}
                value={val}
                placeholder={placeholder}
                onChange={(e) => onChange(e.target.value)}
            />
        );

        const RoomRow = ({ room, actualIdx, globalIdx, updateRoom, updateGuest, changeRoomType, removeRoom, dragRoomStart, dragRoomEnter, dragRoomEnd, dropRoom, fontSize, isInternationalRooming, isSharedMode }) => (
            <div
                className="room-row room-grid group relative bg-white w-full h-full border-b border-slate-300 last:border-b-0 print:border-b box-border print:py-0"
                style={{ breakInside: 'avoid' }}
                draggable={!isSharedMode}
                onDragStart={!isSharedMode ? (e) => dragRoomStart(e, globalIdx) : undefined}
                onDragEnter={!isSharedMode ? (e) => dragRoomEnter(e, globalIdx) : undefined}
                onDragEnd={!isSharedMode ? dragRoomEnd : undefined}
                onDrop={!isSharedMode ? dropRoom : undefined}
                onDragOver={!isSharedMode ? (e) => e.preventDefault() : undefined}
            >
                <div className={`no-print flex items-center justify-center border-r border-slate-200 text-slate-300 ${!isSharedMode ? 'hover:text-blue-500 drag-handle' : ''}`} title={!isSharedMode ? "드래그하여 방 순서 변경" : ""}>
                    <i className="fas fa-bars"></i>
                </div>

                <div className="flex items-center justify-center border-r border-slate-200 py-1 print:py-0.5 bg-slate-50">
                    <span className="font-bold text-slate-700 text-center" style={{ fontSize: `${fontSize}pt` }}>{actualIdx}</span>
                </div>

                <div className="flex items-center justify-center border-r border-slate-200 py-1 print:py-0.5 px-1">
                    <select className="font-bold text-slate-600 bg-transparent outline-none cursor-pointer w-full text-center" style={{ fontSize: `${Math.max(8, fontSize - 1)}pt` }} value={room.type} onChange={(e) => changeRoomType(globalIdx, e.target.value)}>
                        <option value="TWIN">TWN</option><option value="TRIPLE">TRP</option><option value="SINGLE">SGL</option><option value="QUAD">QUAD</option>
                    </select>
                </div>

                <div className="flex flex-col py-0.5 print:py-0 bg-white min-w-0 border-r border-slate-200 justify-center">
                    {room.guests.map((g, gIdx) => (
                        <div key={gIdx} className={`flex flex-col px-1.5 md:px-2 py-1 print:py-0.5 ${gIdx > 0 ? 'border-t border-dashed border-slate-200' : ''}`}>
                            <div className="flex items-center gap-1 md:gap-2 w-full">
                                <input className="font-bold outline-none bg-transparent focus:text-blue-600" style={{ fontSize: `${fontSize}pt`, width: `${Math.max(70, fontSize * 6)}px` }} value={g.name} placeholder="이름" onChange={(e) => updateGuest(globalIdx, gIdx, 'name', e.target.value)} />
                                <button type="button" onClick={() => updateGuest(globalIdx, gIdx, 'gender', g.gender === '남' ? '여' : '남')} className={`flex-shrink-0 font-bold px-1.5 py-0.5 rounded cursor-pointer ${g.gender === '여' ? 'bg-pink-50 text-pink-600' : 'bg-blue-50 text-blue-600'}`} style={{ fontSize: `${Math.max(8, fontSize - 2)}pt`, minWidth: '26px' }}>
                                    {g.gender}
                                </button>
                                <input className="flex-1 min-w-[20px] text-slate-500 outline-none bg-transparent" style={{ fontSize: `${Math.max(9, fontSize - 1)}pt` }} placeholder={isSharedMode ? "(비고 입력)" : ""} value={g.remark} onChange={(e) => updateGuest(globalIdx, gIdx, 'remark', e.target.value)} />
                            </div>
                            {isInternationalRooming && (
                                <input className="font-bold tracking-wide text-slate-500 outline-none uppercase bg-transparent w-full mt-0.5 print:mt-0" style={{ fontSize: `${Math.max(8, fontSize - 1.5)}pt` }} placeholder="ENGLISH NAME" value={g.engName} onChange={(e) => updateGuest(globalIdx, gIdx, 'engName', e.target.value)} />
                            )}
                        </div>
                    ))}
                </div>

                <div className="flex items-center justify-center p-1 print:p-0 bg-white min-w-0 relative">
                    <input className="w-full text-center font-bold text-slate-600 bg-transparent outline-none" style={{ fontSize: `${fontSize}pt` }} placeholder="추후 배정" value={room.roomNo} onChange={(e) => updateRoom(globalIdx, 'roomNo', e.target.value)} />
                    <button type="button" onClick={() => removeRoom(globalIdx)} className="no-print absolute -right-3 top-1/2 -translate-y-1/2 p-1.5 bg-white border border-slate-200 rounded-full text-slate-400 hover:text-red-500 opacity-0 group-hover:opacity-100 z-10 shadow-sm"><i className="fas fa-trash-alt" style={{ fontSize: `${Math.max(8, fontSize - 2)}pt` }}></i></button>
                </div>
            </div>
        );

        // 메인 컴포넌트
        const App = () => {
            const searchParams = new URLSearchParams(window.location.search);
            const isInitialShared = searchParams.get('shared') === 'true';
            const urlEventCode = searchParams.get('code') || '';

            const [isSharedMode, setIsSharedMode] = useState(isInitialShared);
            const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(isInitialShared); 
            const [activeMainTab, setActiveMainTab] = useState(isInitialShared ? 'rooming' : 'traveler');
            const [isNavMenuOpen, setIsNavMenuOpen] = useState(true);

            const [docFontSize, setDocFontSize] = useState(10.5); 
            const [commonHeader, setCommonHeader] = useState({ 
                groupName: "", 
                date: "", 
                location: "", 
                number: "", 
                eventCode: urlEventCode || generateEventCode() 
            });

            const [modal, setModal] = useState({ isOpen: false, type: 'alert', message: '', inputValue: '', onConfirm: null, onCancel: null, onChange: null });
            
            const [isLoading, setIsLoading] = useState(true);
            const [isSubmitting, setIsSubmitting] = useState(false); 
            const [submitSuccess, setSubmitSuccess] = useState(false);

            // Firebase States
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [submissions, setSubmissions] = useState([]);

            const appId = typeof __app_id !== 'undefined' ? __app_id : 'tourmaker-rooming-app';

            // 1. Firebase Initialization & Auth
            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        while(!window.FirebaseModules) {
                            await new Promise(r => setTimeout(r, 50));
                        }
                        const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore } = window.FirebaseModules;

                        let firebaseConfig;
                        if (typeof __firebase_config !== 'undefined') {
                            firebaseConfig = JSON.parse(__firebase_config);
                        } else {
                            firebaseConfig = {
                                apiKey: "AIzaSyDPR8YwFV4CuGoaD7q4EVwNEalr4tjTWYY",
                                authDomain: "tourmaker-rooming.firebaseapp.com",
                                projectId: "tourmaker-rooming",
                                storageBucket: "tourmaker-rooming.firebasestorage.app",
                                messagingSenderId: "385267239471",
                                appId: "1:385267239471:web:2aa4e619ceecb4c68794da",
                                measurementId: "G-6JY6RP70BM"
                            };
                            console.warn("⚠️ 캔버스 환경이 아닌 외부 도메인입니다. 입력하신 파이어베이스 설정을 로드합니다.");
                        }

                        const app = initializeApp(firebaseConfig);
                        const auth = getAuth(app);
                        const firestoreDb = getFirestore(app);
                        setDb(firestoreDb);

                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }

                        onAuthStateChanged(auth, (u) => {
                            setUser(u);
                            if(!isInitialShared) {
                                setModal({
                                    isOpen: true,
                                    type: 'adminAuth',
                                    message: '보안 구역입니다. 관리자 비밀번호를 입력해 주세요.',
                                    inputValue: '',
                                });
                            } else {
                                setIsLoading(false);
                            }
                        });

                    } catch (err) {
                        console.error("Firebase init error:", err);
                        setIsLoading(false);
                    }
                };
                initFirebase();
            }, []);

            const handleAdminAuth = () => {
                if (modal.inputValue === ADMIN_PASSWORD) {
                    setIsAdminAuthenticated(true);
                    setIsLoading(false);
                    setModal({ isOpen: false, type: 'alert', message: '', inputValue: '' });
                } else {
                    alert("비밀번호가 일치하지 않습니다.");
                }
            };

            // 2. Fetch Submissions (Manager View only)
            useEffect(() => {
                if (!user || !db || isSharedMode || !isAdminAuthenticated) return;

                let unsubscribe = () => {};
                const fetchSubs = async () => {
                    try {
                        while(!window.FirebaseModules) {
                            await new Promise(r => setTimeout(r, 50));
                        }
                        const { collection, onSnapshot, query, where } = window.FirebaseModules;
                        const subRef = collection(db, 'artifacts', appId, 'public', 'data', 'rooming_submissions');
                        
                        const q = query(subRef, where("eventCode", "==", commonHeader.eventCode));
                        
                        unsubscribe = onSnapshot(q, (snapshot) => {
                            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            const sorted = data.sort((a, b) => new Date(b.submittedAt) - new Date(a.submittedAt));
                            setSubmissions(sorted);
                        }, (error) => {
                            console.error("Snapshot error:", error);
                        });
                    } catch (err) {
                        console.error("Fetch error:", err);
                    }
                };
                fetchSubs();
                return () => unsubscribe();
            }, [user, db, isSharedMode, commonHeader.eventCode, isAdminAuthenticated]);


            const showAlert = (message) => {
                setModal({ isOpen: true, type: 'alert', message, inputValue: '', onConfirm: () => setModal({ isOpen: false, type: 'alert', message: '', inputValue: '', onConfirm: null, onCancel: null }), onChange: null });
            };

            const showPrompt = (message, defaultValue, onConfirmCallback) => {
                setModal({
                    isOpen: true,
                    type: 'prompt',
                    message,
                    inputValue: defaultValue,
                    onChange: (val) => setModal(prev => ({ ...prev, inputValue: val })),
                    onConfirm: () => {
                        setModal(prev => {
                            onConfirmCallback?.(prev.inputValue);
                            return { isOpen: false, type: 'alert', message: '', inputValue: '', onConfirm: null, onCancel: null, onChange: null };
                        });
                    },
                    onCancel: () => setModal({ isOpen: false, type: 'alert', message: '', inputValue: '', onConfirm: null, onCancel: null, onChange: null })
                });
            };

            const showPrintConfirm = () => {
                setModal({
                    isOpen: true,
                    type: 'confirm',

                    let y = parseInt(clean.substring(0, 2), 10);
                    y += (y > 50 ? 1900 : 2000); 
                    normalizedStr = `${y}-${clean.substring(2, 4)}-${clean.substring(4, 6)}`;

                const match = normalizedStr.match(/(\d{2,4})[-./년]?\s*(\d{1,2})[-./월]?\s*(\d{1,2})/);
                if (!match) return { color: "text-slate-600", warning: false };
                let year = parseInt(match[1], 10);

                const day = parseInt(match[3], 10);

                            // 엑셀 숫자 타입인 경우 (날짜 일련번호 또는 그냥 숫자형식)
                            if (typeof cellVal === 'number') {
                                if (cellVal > 10000 && cellVal < 60000) { 
                                    // Excel Date Serial Number 변환
                                    const date_info = new Date(Math.round((cellVal - 25569) * 86400 * 1000));
                                    return `${date_info.getUTCFullYear()}-${String(date_info.getUTCMonth() + 1).padStart(2, '0')}-${String(date_info.getUTCDate()).padStart(2, '0')}`;
                                }
                                let numStr = String(cellVal).trim();
                                if (/^\d{8}$/.test(numStr)) {
                                    return `${numStr.substring(0,4)}-${numStr.substring(4,6)}-${numStr.substring(6,8)}`;
                                }
                                if (/^\d{6}$/.test(numStr)) {
                                    let y = parseInt(numStr.substring(0, 2), 10);
                                    y += (y > 50 ? 1900 : 2000);
                                    return `${y}-${numStr.substring(2, 4)}-${numStr.substring(4, 6)}`;
                                }
                                return numStr;
                            }
                            
                            // 문자열인 경우
                            let strVal = String(cellVal).trim();
                            const cleanStr = strVal.replace(/[\s\.\/,-]/g, '');
                            
                            // 8자리 YYYYMMDD 체크
                            if (/^\d{8}$/.test(cleanStr)) {
                                return `${cleanStr.substring(0,4)}-${cleanStr.substring(4,6)}-${cleanStr.substring(6,8)}`;
                            }
                            // 6자리 YYMMDD 체크
                            if (/^\d{6}$/.test(cleanStr)) {
                                let y = parseInt(cleanStr.substring(0, 2), 10);
                                y += (y > 50 ? 1900 : 2000);
                                return `${y}-${cleanStr.substring(2, 4)}-${cleanStr.substring(4, 6)}`;
                            }
                            
                            // 정규화된 형태의 매칭 (오타 포함)
                            strVal = strVal.replace(/[\.\/,\s]+/g, '-').replace(/-+$/, '');
                            const stdMatch = strVal.match(/^(\d{2,4})-(\d{1,2})-(\d{1,2})$/);
                            if (stdMatch) {

                            }
